<style>

  .award-cat{font-size:11px;color:#8a8fa8;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px;}

  .award-item{display:flex;align-items:center;gap:8px;font-size:13px;}
  .award-medal{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
  .award-medal.gold{background:var(--accent);color:#1a1d2e;}
  .award-medal.silver{background:#c5cad8;color:#1a1d2e;}

    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#dfe2f0;transition:.12s;}
  .gsel button:hover{border-color:#5dd1ff;}
  .gsel button.on{background:#5dd1ff;color:#0a0c18;border-color:#5dd1ff;}
  .gsel button.fin{border-color:var(--accent);color:var(--accent);}
  .gsel button.fin.on{background:var(--accent);color:#1a1d2e;border-color:var(--accent);}
</style>

<script>
/* SW только по http/https — локальный просмотр file:// не падает */
if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});

/* Промо-плашка «установите как приложение»: iPhone — инструкция Safari/«На экран Домой»,
   Android — кнопка установки (beforeinstallprompt) или инструкция про меню Chrome.

(function(){try{
  if(!/^https?:$/.test(location.protocol))return;
  if((window.matchMedia&&matchMedia('(display-mode: standalone)').matches)||navigator.standalone)return;
  var KEY='mgs_pwa_promo_hide_until';
  try{if(Date.now()<(+localStorage.getItem(KEY)||0))return;}catch(e){}
  var deferred=null,shown=false;
  addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;
    var b=document.getElementById('mgsPwaGo');if(b){b.style.display='inline-block';}});
  function hide(days){try{localStorage.setItem(KEY,String(Date.now()+days*864e5));}catch(e){}
    var el=document.getElementById('mgsPwaPromo');if(el)el.parentNode.removeChild(el);}
  function show(){
    if(shown)return;shown=true;
    var ua=navigator.userAgent||'',isIOS=/iPhone|iPad|iPod/.test(ua),isAndroid=/Android/.test(ua);

    else{how='В Chrome/Edge: значок установки в адресной строке (справа).';}
    var tb=document.querySelector('.tabbar'),off='14px';

    var d=document.createElement('div');d.id='mgsPwaPromo';
    d.innerHTML='<style>#mgsPwaPromo{position:fixed;left:12px;right:12px;bottom:'+off+';z-index:99990;max-width:520px;margin:0 auto;'+
      'background:linear-gradient(180deg,#12294a,#0f2138);border:1px solid rgba(212,175,55,.45);border-radius:14px;'+

      '#mgsPwaPromo .h{font-size:12px;line-height:1.45;color:#9fb2cc;}#mgsPwaPromo .h b{color:#eef3fb;}'+
      '#mgsPwaPromo .r{display:flex;gap:8px;margin-top:9px;align-items:center;}'+
      '#mgsPwaPromo button{font:inherit;font-size:12px;font-weight:800;border-radius:9px;padding:7px 13px;cursor:pointer;}'+

      '<div class="t">📲 MafgameStat можно установить как приложение</div>'+
      '<div class="h">Иконка на экране, полноэкранный режим и быстрый доступ к live-статистике.<br>'+how+'</div>'+
      '<div class="r"><button id="mgsPwaGo">Установить</button><button id="mgsPwaLater">Позже</button></div>';
    document.body.appendChild(d);
    var go=document.getElementById('mgsPwaGo');
    if(deferred)go.style.display='inline-block';
    go.onclick=function(){if(!deferred)return;deferred.prompt();deferred.userChoice.then(function(){hide(365);});};
    document.getElementById('mgsPwaLater').onclick=function(){hide(14);};
  }
  if(document.readyState==='loading')addEventListener('DOMContentLoaded',function(){setTimeout(show,900);});

<div class="container">

    <div class="card" id="meta-card" style="margin-bottom:16px;">
      <h3 style="margin:0 0 14px;font-size:13px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;">Турнир</h3>
      <div class="meta-rows" id="meta"></div>

<script src="data/live.js"></script>
<script>
const T = new URLSearchParams(location.search).get('t') || '826';
const STAGE_LABELS = {total:'Итоговая', final:'Финал', semifinal:'Полуфинал', qualification:'Квалификация'};
const AWARD_LABELS = {
  most_valuable_players:'MVP турнира', most_valuable_mafia:'Лучшая мафия',
  most_valuable_citizen:'Лучший мирный', best_don:'Лучший дон',
  best_sheriff:'Лучший шериф', most_killed:'Чаще всех убит 1-й ночью'
};
let DATA = null, GAMES = null, currentStage = null, sliderN = 0;

async function load() {
  const r = await fetch(`data/tournament_${T}.json`);
  if (!r.ok) throw new Error('Нет данных для турнира ' + T);
  DATA = await r.json();
  if (DATA.accent) document.documentElement.style.setProperty('--accent', DATA.accent);
  // live-режим: пробуем подтянуть данные игр для ползунка и ролевой разбивки
  GAMES = await window.loadGames(T);
  const orderedKeys = ['total','final','semifinal','qualification'].filter(k => DATA.standings[k]?.length);
  currentStage = orderedKeys[0] || 'qualification';
  document.getElementById('link-tournament').href = `tournament.html?t=${T}`;
  document.getElementById('link-results').href = `results.html?t=${T}`;
  document.getElementById('link-player').href = `player.html?t=${T}`;
  document.getElementById('link-roles').href = `roles.html?t=${T}`;
  document.querySelectorAll('#switcher a').forEach(a => {
    if (a.href.includes(`t=${T}`)) a.classList.remove('muted');
  });
  renderMeta();
  renderAwards();
  buildTeamMap();
  const hasResults = GAMES && GAMES.games && GAMES.games.some(g=>(g.tables||[]).some(tb=>(tb.seats||[]).some(s=>s.role)));
  if (DATA.teams && DATA.teams.length && !hasResults) {
    renderTeamsRoster();
  } else if (GAMES && GAMES.games?.length && (DATA.in_progress || !DATA.standings || !Object.keys(DATA.standings).length)) {
    sliderN = startedCount();
    if (DATA.teams && DATA.teams.length) renderPaired(); else if (hasPlayedFinalStage()) renderLiveStaged(); else renderLive();
  } else {
    renderMain();
  }
}

function renderTeamsRoster(){
  const teams=DATA.teams||[];
  const note=`<div class="progress-note">Парный турнир · <strong>${teams.length} команд</strong> по ${DATA.team_size||2}. Результаты и зачёт (по командам и игрокам) появятся после старта. Рассадка уже доступна — см. «Игры» и «Совместные посадки».</div>`;
  const cards=teams.map((t,i)=>`<tr${i<3?'':''}>
    <td class="left place">${i+1}</td>
    <td class="left player-cell"><b style="color:#fff;font-size:14px">${escapeHtml(t.team)}</b></td>
    <td class="left" style="color:#dfe2f0">${(t.members||[]).map(m=>`<a class="player-name" href="player.html?nick=${encodeURIComponent(m)}&t=${T}">${escapeHtml(m)}</a>`).join(' · ')}</td>
  </tr>`).join('');
  document.getElementById('main').innerHTML=`${note}<div class="card" style="padding:0;overflow-x:auto;">
    <table class="standings"><thead><tr><th class="left place">#</th><th class="left player-cell">Команда</th><th class="left">Игроки</th></tr></thead>
    <tbody>${cards}</tbody></table></div>`;
}
/* ════ LIVE STAGED: авто-разбивка Квалификация/Финал/Итоговая (когда сыгран финал) ════ */
let LIVE_STAGES=null, curLiveStage='total';
function isFinalStage(g){return (g.stage||'')==='Финал';}
function gameHasRoles(g){return (g.tables||[]).some(tb=>(tb.seats||[]).some(s=>s.role));}
function hasPlayedFinalStage(){return !!(GAMES&&GAMES.games&&GAMES.games.some(g=>isFinalStage(g)&&gameHasRoles(g)));}
function aggregate(gameList){
  const P={};
  const get=name=>P[name]||(P[name]={name,wpts:0,aps:0,ci:0,w:0,games:0,k:0,
    roles:{Citizen:{w:0,g:0},Sheriff:{w:0,g:0},Mafia:{w:0,g:0},Don:{w:0,g:0}}});
  let redWins=0,blackWins=0,tables=0,apsSum=0;
  gameList.forEach(game=>game.tables.forEach(tb=>{
    tables++;
    if(tb.winner==='red_win')redWins++;else if(tb.winner==='black_win')blackWins++;
    tb.seats.forEach(s=>{const p=get(s.name);p.games++;p.wpts+=s.wpts||0;p.aps+=s.aps||0;p.ci+=s.ci||0;apsSum+=s.aps||0;
      if(s.result==='W')p.w++;if(s.marker==='first_killed')p.k++;const r=p.roles[s.role];if(r){r.g++;if(s.result==='W')r.w++;}});
  }));
  const rows=Object.values(P).map(p=>({...p,sigma:+(p.wpts+p.aps+p.ci).toFixed(2)}));
  rows.sort((a,b)=>b.sigma-a.sigma||b.aps-a.aps||a.name.localeCompare(b.name,'ru'));
  rows.forEach((r,i)=>r.place=i+1);
  return {rows,redWins,blackWins,tables,apsSum};
}
function liveRowsHtml(rows){
  return rows.map((r,i)=>`<tr${i<3?' class="top-3"':''}>
      <td class="left place">${r.place}</td>
      <td class="left player-cell"><a class="player-name" href="player.html?nick=${encodeURIComponent(r.name)}&t=${T}">${escapeHtml(r.name)}</a><span class="club">${escapeHtml(PLAYER_TEAM[r.name]||'')}</span></td>
      <td>${numCell(r.sigma,'big')}</td>
      <td>${numCell(r.wpts)}</td>
      <td>${numCell(+r.aps.toFixed(2), r.aps>0?'':'dim')}</td>
      <td>${numCell(+r.ci.toFixed(2), r.ci>0?'':'dim')}</td>
      ${ratioCell(r.roles.Citizen)}${ratioCell(r.roles.Sheriff)}${ratioCell(r.roles.Mafia)}${ratioCell(r.roles.Don)}
      <td>${numCell(r.k, r.k>0?'neg':'dim')}</td>
      <td><span class="num"><b style="color:#3fd17a">${r.w||0}</b><span style="color:#5a5e76">/${r.games}</span></span></td>
    </tr>`).join('');
}
function renderLiveStaged(){
  const qualG=GAMES.games.filter(g=>!isFinalStage(g)&&gameHasRoles(g));
  const finG=GAMES.games.filter(g=>isFinalStage(g)&&gameHasRoles(g));
  const allG=GAMES.games.filter(gameHasRoles);
  LIVE_STAGES={total:aggregate(allG),final:aggregate(finG),qualification:aggregate(qualG)};
  const labels={total:'Итоговая',final:'Финал',qualification:'Квалификация'};
  const order=['total','final','qualification'].filter(k=>LIVE_STAGES[k].rows.length);
  if(!order.includes(curLiveStage))curLiveStage='total';
  const tabs=`<div class="stages">${order.map(k=>`<button class="stage-btn${k===curLiveStage?' active':''}" data-lstage="${k}">${labels[k]}<span class="count">${LIVE_STAGES[k].rows.length}</span></button>`).join('')}</div>`;
  const cur=LIVE_STAGES[curLiveStage];
  const liveBadge=DATA.in_progress?' <span class="live-badge">live</span>':'';
  const chips=`<div class="chips">

function buildStandings(n) {
  // standings по первым n играм
  const P = {};
  const get = name => P[name] || (P[name] = {name, wpts:0, aps:0, ci:0, w:0, games:0, k:0,
    roles:{Citizen:{w:0,g:0}, Sheriff:{w:0,g:0}, Mafia:{w:0,g:0}, Don:{w:0,g:0}}});
  let redWins=0, blackWins=0, tables=0, apsSum=0;
  GAMES.games.slice(0, n).forEach(game => {
    game.tables.forEach(tb => {
      tables++;
      if (tb.winner === 'red_win') redWins++; else if (tb.winner === 'black_win') blackWins++;
      tb.seats.forEach(s => {
        const p = get(s.name);
        p.games++; p.wpts += s.wpts||0; p.aps += s.aps||0; p.ci += s.ci||0; apsSum += s.aps||0;
        if (s.result === 'W') p.w++;
        if (s.marker === 'first_killed') p.k++;
        const r = p.roles[s.role]; if (r) { r.g++; if (s.result==='W') r.w++; }
      });
    });
  });
  const rows = Object.values(P).map(p => ({...p, sigma: +(p.wpts + p.aps + p.ci).toFixed(2)}));
  rows.sort((a,b) => b.sigma - a.sigma || b.aps - a.aps || a.name.localeCompare(b.name,'ru'));
  rows.forEach((r,i) => r.place = i+1);
  return {rows, redWins, blackWins, tables, apsSum};
}

function buildTeamMap(){
  PLAYER_TEAM={}; TEAM_INFO={};
  (DATA.teams||[]).forEach(t=>{ TEAM_INFO[t.team]={num:t.num,members:t.members||[]}; (t.members||[]).forEach(m=>PLAYER_TEAM[m]=t.team); });
}
function startedCount(){
  if(!GAMES||!GAMES.games) return 0;
  return GAMES.games.filter(g=>(g.tables||[]).some(tb=>(tb.seats||[]).some(s=>s.role))).length;
}
function aggregateTeams(rows){
  const M={};
  rows.forEach(r=>{
    const tn=PLAYER_TEAM[r.name]; if(!tn) return;
    const t=M[tn]||(M[tn]={team:tn,num:(TEAM_INFO[tn]||{}).num,sigma:0,wpts:0,aps:0,ci:0,w:0,games:0,k:0,members:[]});
    t.sigma+=r.sigma; t.wpts+=r.wpts; t.aps+=r.aps; t.ci+=r.ci; t.w+=r.w; t.games+=r.games; t.k+=r.k; t.members.push(r);
  });
  const arr=Object.values(M).map(t=>({...t,sigma:+t.sigma.toFixed(2),wpts:+t.wpts.toFixed(2),aps:+t.aps.toFixed(2),ci:+t.ci.toFixed(2)}));
  arr.sort((a,b)=>b.sigma-a.sigma||b.aps-a.aps||(a.num||0)-(b.num||0));
  arr.forEach((t,i)=>t.place=i+1);
  return arr;
}

        <td class="left player-cell"><a class="player-name" href="player.html?nick=${encodeURIComponent(r.name)}&t=${T}">${escapeHtml(r.name)}</a>
          ${r.club ? `<span class="club">${escapeHtml(r.club)}</span>` : ''}</td>
        <td>${numCell(r.sigma, 'big')}</td>
        <td>${numCell(r.sigma_ap)}</td>
        <td>${numCell(r.bm, r.bm > 0 ? '' : 'dim')}</td>
        <td>${numCell(r.ci, r.ci > 0 ? '' : 'dim')}</td>
        ${ratioCell(rm.Citizen)}${ratioCell(rm.Sheriff)}${ratioCell(rm.Mafia)}${ratioCell(rm.Don)}
        <td>${numCell(rm.k, rm.k > 0 ? 'neg' : 'dim')}</td>
        <td><span class="num"><b style="color:#3fd17a">${r.w!=null?r.w:0}</b><span style="color:#5a5e76">/${r.games != null ? r.games : (rm.Citizen.g+rm.Sheriff.g+rm.Mafia.g+rm.Don.g)}</span></span></td>
      </tr>`;
    }).join('');
    return;
  }
  document.getElementById('tbody').innerHTML = rows.map((r, i) => {
    return `<tr${i<3?' class="top-3"':''}>
      <td class="left place">${r.place}</td>
      <td class="left player-cell">
        <a class="player-name" href="player.html?nick=${encodeURIComponent(r.name)}&t=${T}">${escapeHtml(r.name)}</a>
        ${r.club ? `<span class="club">${escapeHtml(r.club)}</span>` : ''}
      </td>
      <td>${numCell(r.sigma, 'big')}</td>
      <td>${numCell(r.wpts != null ? r.wpts : '—')}</td>
      <td>${numCell(r.sigma_ap)}</td>
      <td>${numCell(r.plus, r.plus > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.minus, r.minus > 0 ? 'neg' : 'dim')}</td>
      <td>${numCell(r.bm, r.bm > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.ci, r.ci > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.w)}</td>
      <td>${numCell(r.d, r.d > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.s, r.s > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.k, r.k > 0 ? '' : 'dim')}</td>
    </tr>`;
  }).join('');
}
function renderReconNote(){
  const el=document.getElementById('recon-note'); if(!el) return;
  if(currentStage!=='total' || !DATA.reconciliation){ el.innerHTML=''; return; }
  const rc=DATA.reconciliation;
  el.innerHTML=`<div class="progress-note" style="background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.12);color:#8a8fa8;">
    <strong style="color:var(--accent);">Источник.</strong> ${escapeHtml(rc.source||'')} Игроков ${rc.players}, игр ${rc.games_total} (${rc.games_qual} квал + ${rc.games_final} финал). Чемпион — ${escapeHtml(rc.champion||'')}.
    ${rc.transfer_check_total?`Контроль переноса (Σ = WPTS + Σap + Ci по офиц. данным): итог ${rc.transfer_check_total}, квалификация ${rc.transfer_check_qual}, финал ${rc.transfer_check_final}.`:''}
  </div>`;
}
function numCell(v, cls='') {
  if (v === '—') return '<span class="num dim">—</span>';
  const n = Number(v);
  if (isNaN(n)) return '—';
  const str = Number.isInteger(n) ? n.toString() : n.toFixed(2).replace(/\.?0+$/, '');
  return `<span class="num ${cls}">${str || '0'}</span>`;
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
load().catch(e => { document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#e8716b;">Ошибка: ' + e.message + '</div>'; console.error(e); });
</script>
