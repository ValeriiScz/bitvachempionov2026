<!DOCTYPE html>
<html lang="ru">
<head>
<!-- MafgameStat · standings.html · v2.1 · 2026-06-12 · сводная таблица: ползунок «после игры N», роли R/S/B/D, сводка красных/чёрных, Δ мест -->
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Сводная — MafgameStat</title>
<style>
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{margin:0;background:radial-gradient(circle at 50% 0%,#1a1d2e 0%,#0a0c18 60%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:24px 16px 60px;}
  .topbar{max-width:1280px;margin:0 auto 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;}
  .nav-left{display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .nav-btn{padding:9px 16px;background:rgba(255,184,77,.12);border:1px solid #ffb84d;color:#ffb84d;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:.15s;}
  .nav-btn:hover{background:#ffb84d;color:#1a1d2e;}
  .nav-btn.muted{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#dfe2f0;}
  .nav-btn.muted:hover{background:rgba(255,255,255,.10);color:#fff;}
  .title{font-size:24px;font-weight:800;letter-spacing:-.5px;}
  .title .acc{color:#ffb84d;}
  .sub{color:#a0a4b8;font-size:13px;margin-top:4px;}
  .live-badge{display:inline-block;padding:3px 8px;background:#3fd17a;color:#0a0c18;border-radius:4px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-left:6px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
  .container{max-width:1280px;margin:0 auto;display:grid;grid-template-columns:320px 1fr;gap:20px;}
  @media (max-width:920px){ .container{grid-template-columns:1fr;} }
  .card{background:linear-gradient(180deg,#1a1d2e 0%,#232744 100%);border-radius:18px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.04);}
  .meta-rows{display:grid;grid-template-columns:auto 1fr;gap:8px 14px;font-size:13px;}
  .meta-rows .k{color:#8a8fa8;}
  .meta-rows .v{color:#dfe2f0;font-weight:600;}
  .awards h3{margin:0 0 14px;font-size:13px;font-weight:700;color:#ffb84d;text-transform:uppercase;letter-spacing:1.5px;}
  .award-row{padding:10px 0;border-top:1px solid rgba(255,255,255,.06);}
  .award-row:first-of-type{border-top:none;}
  .award-cat{font-size:11px;color:#8a8fa8;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:6px;}
  .award-list{display:flex;flex-direction:column;gap:4px;}
  .award-item{display:flex;align-items:center;gap:8px;font-size:13px;}
  .award-medal{width:18px;height:18px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
  .award-medal.gold{background:#ffb84d;color:#1a1d2e;}
  .award-medal.silver{background:#c5cad8;color:#1a1d2e;}
  .award-medal.bronze{background:#d18a4a;color:#1a1d2e;}
  .award-name{color:#fff;font-weight:600;cursor:pointer;text-decoration:none;}
  .award-name:hover{color:#5dd1ff;}
  .award-val{color:#8a8fa8;font-size:12px;margin-left:auto;}
  .stages{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
  .stage-btn{padding:9px 18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:#dfe2f0;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;}
  .stage-btn:hover{background:rgba(255,184,77,.12);border-color:#ffb84d;}
  .stage-btn.active{background:#ffb84d;color:#1a1d2e;border-color:#ffb84d;}
  .stage-btn .count{opacity:.7;font-weight:600;margin-left:6px;}
  table.standings{width:100%;border-collapse:collapse;font-size:13px;}
  table.standings th{position:sticky;top:0;background:#0a0c18;color:#8a8fa8;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:10px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.08);}
  table.standings th.left{text-align:left;}
  table.standings td{padding:10px 6px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;}
  table.standings td.left{text-align:left;}
  table.standings tr:hover td{background:rgba(255,255,255,.03);}
  table.standings tr.top-3 td.place{color:#ffb84d;font-weight:800;}
  .place{width:36px;color:#a0a4b8;font-weight:700;white-space:nowrap;}
  .delta{font-size:10px;font-weight:800;margin-left:4px;}
  .delta.up{color:#3fd17a;}
  .delta.dn{color:#e8716b;}
  .delta.eq{color:#5a5e76;}
  .player-cell{min-width:170px;}
  .player-name{color:#fff;font-weight:700;text-decoration:none;}
  .player-name:hover{color:#5dd1ff;}
  .club{color:#8a8fa8;font-size:11px;display:block;margin-top:2px;}
  .num{font-variant-numeric:tabular-nums;font-weight:600;color:#dfe2f0;}
  .num.dim{color:#5a5e76;}
  .num.neg{color:#e8716b;}
  .num.big{color:#ffb84d;font-weight:800;font-size:14px;}
  .ratio{font-variant-numeric:tabular-nums;font-weight:700;}
  .ratio .of{color:#5a5e76;font-weight:600;}
  .ratio.good{color:#3fd17a;}
  .ratio.bad{color:#e8716b;}
  .ratio.mid{color:#dfe2f0;}
  .ratio.zero{color:#5a5e76;}
  .empty{padding:40px;text-align:center;color:#8a8fa8;}
  .progress-note{margin-bottom:16px;padding:12px 14px;background:rgba(63,209,122,.08);border:1px dashed rgba(63,209,122,.35);border-radius:10px;font-size:12px;color:#a0a4b8;line-height:1.6;}
  .progress-note strong{color:#3fd17a;}
  /* ── сводка-чипы ── */
  .chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;}
  .chip{padding:10px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;font-size:12px;color:#a0a4b8;}
  .chip b{display:block;font-size:17px;font-weight:800;color:#fff;margin-top:2px;font-variant-numeric:tabular-nums;}
  .chip.red b{color:#ff6b6b;}
  .chip.black b{color:#c5cad8;}
  .chip.gold b{color:#ffb84d;}
  /* ── ползунок ── */
  .gsel-wrap{margin-bottom:18px;padding:12px 14px;background:rgba(93,209,255,.06);border:1px solid rgba(93,209,255,.25);border-radius:12px;}
  .gsel-head{font-size:12px;color:#a0a4b8;margin-bottom:10px;}
  .gsel-head b{color:#5dd1ff;font-size:13px;}
  .gsel{display:flex;flex-wrap:wrap;gap:6px;}
  .gsel button{min-width:40px;min-height:40px;padding:6px 10px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;
    background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#dfe2f0;transition:.12s;}
  .gsel button:hover{border-color:#5dd1ff;}
  .gsel button.on{background:#5dd1ff;color:#0a0c18;border-color:#5dd1ff;}
</style>
</head>
<body>

<div class="topbar">
  <div class="nav-left">
    <a class="nav-btn muted" id="link-tournament" href="./">← Турнир</a>
    <a class="nav-btn muted" href="results.html" id="link-results">Игры</a>
    <a class="nav-btn muted" href="player.html" id="link-player">Игроки</a>
    <div>
      <div class="title" id="title">Сводная</div>
      <div class="sub" id="subtitle">…</div>
    </div>
  </div>
  <div id="switcher" style="display:flex;gap:8px;">
    <a class="nav-btn muted" href="?t=826">826</a>
    <a class="nav-btn muted" href="?t=622">622</a>
  </div>
</div>

<div class="container">
  <aside>
    <div class="card" id="meta-card" style="margin-bottom:16px;">
      <h3 style="margin:0 0 14px;font-size:13px;font-weight:700;color:#ffb84d;text-transform:uppercase;letter-spacing:1.5px;">Турнир</h3>
      <div class="meta-rows" id="meta"></div>
    </div>
    <div class="card awards" id="awards-card">
      <h3>Награды</h3>
      <div id="awards"></div>
    </div>
  </aside>
  <main id="main"></main>
</div>

<script src="data/live.js"></script>
<script>
const T = new URLSearchParams(location.search).get('t') || '826';
const STAGE_LABELS = {final:'Финал', semifinal:'Полуфинал', qualification:'Квалификация'};
const AWARD_LABELS = {
  most_valuable_players:'MVP турнира', most_valuable_mafia:'Лучшая мафия',
  most_valuable_citizen:'Лучший мирный', best_don:'Лучший дон',
  best_sheriff:'Лучший шериф', most_killed:'Чаще всех убит 1-й ночью'
};
let DATA = null, GAMES = null, currentStage = null, sliderN = 0;

async function load() {
  const r = await fetch(`data/tournament_${T}.json`);
  if (!r.ok) throw new Error('Нет данных для турнира ' + T);
  DATA = await r.json();
  // live-режим: пробуем подтянуть данные игр для ползунка и ролевой разбивки
  GAMES = await window.loadGames(T);
  const orderedKeys = ['final','semifinal','qualification'].filter(k => DATA.standings[k]?.length);
  currentStage = orderedKeys[0] || 'qualification';
  document.getElementById('link-tournament').href = `tournament.html?t=${T}`;
  document.getElementById('link-results').href = `results.html?t=${T}`;
  document.getElementById('link-player').href = `player.html?t=${T}`;
  document.querySelectorAll('#switcher a').forEach(a => {
    if (a.href.includes(`t=${T}`)) a.classList.remove('muted');
  });
  renderMeta();
  renderAwards();
  if (GAMES && GAMES.games?.length && (DATA.in_progress || !DATA.standings || !Object.keys(DATA.standings).length)) {
    sliderN = GAMES.games.length;
    renderLive();
  } else {
    renderMain();
  }
}

/* ════ LIVE: пересчёт из игр + ползунок ════ */
function buildStandings(n) {
  // standings по первым n играм
  const P = {};
  const get = name => P[name] || (P[name] = {name, wpts:0, aps:0, w:0, games:0, k:0,
    roles:{Citizen:{w:0,g:0}, Sheriff:{w:0,g:0}, Mafia:{w:0,g:0}, Don:{w:0,g:0}}});
  let redWins=0, blackWins=0, tables=0, apsSum=0;
  GAMES.games.slice(0, n).forEach(game => {
    game.tables.forEach(tb => {
      tables++;
      if (tb.winner === 'red_win') redWins++; else blackWins++;
      tb.seats.forEach(s => {
        const p = get(s.name);
        p.games++; p.wpts += s.wpts||0; p.aps += s.aps||0; apsSum += s.aps||0;
        if (s.result === 'W') p.w++;
        if (s.marker === 'first_killed') p.k++;
        const r = p.roles[s.role]; if (r) { r.g++; if (s.result==='W') r.w++; }
      });
    });
  });
  const rows = Object.values(P).map(p => ({...p, sigma: +(p.wpts + p.aps).toFixed(2)}));
  rows.sort((a,b) => b.sigma - a.sigma || b.aps - a.aps || a.name.localeCompare(b.name,'ru'));
  rows.forEach((r,i) => r.place = i+1);
  return {rows, redWins, blackWins, tables, apsSum};
}
function renderLive(fromOfficial) {
  const backBtn = (!DATA.in_progress && DATA.standings && Object.keys(DATA.standings).length) ? `<div style="margin-bottom:14px;"><button class="stage-btn" id="back-official">← Официальная таблица</button></div>` : '';
  const total = GAMES.games_total || 15;
  const played = GAMES.games.length;
  const cur = buildStandings(sliderN);
  const prev = sliderN > 1 ? buildStandings(sliderN - 1) : null;
  const prevPlace = {};
  if (prev) prev.rows.forEach(r => prevPlace[r.name] = r.place);

  const chips = `<div class="chips">
    <div class="chip">Сыграно игр<b>${played} / ${total}</b></div>
    <div class="chip red">Победы красных<b>${cur.redWins}</b></div>
    <div class="chip black">Победы чёрных<b>${cur.blackWins}</b></div>
    <div class="chip gold">Средний доп / стол<b>${cur.tables ? (cur.apsSum/cur.tables).toFixed(2) : '0'}</b></div>
  </div>`;

  const slider = played > 1 ? `<div class="gsel-wrap">
    <div class="gsel-head">Таблица на момент: <b>после игры ${sliderN}${sliderN===played?' (итог)':''}</b></div>
    <div class="gsel">${Array.from({length:played},(_,i)=>`<button data-n="${i+1}" class="${i+1===sliderN?'on':''}">${i+1}</button>`).join('')}</div>
  </div>` : '';

  const note = DATA.in_progress ? `<div class="progress-note">Турнир <strong>в процессе</strong>. Σ = WPTS + Σap по сыгранным играм; CI и BM начислит судья при закрытии. Δ у места — изменение против предыдущей игры. R/S/B/D — победы/игры в роли: мирный, шериф, мафия, дон.</div>` : `<div class="progress-note">Пересчёт по играм: Σ из протоколов (включая Ci построчно), BM не разложен по играм. Официальный итог — по кнопке выше. R/S/B/D — победы/игры в роли.</div>`;

  document.getElementById('main').innerHTML = `${backBtn}${chips}${slider}${note}<div class="card" style="padding:0;overflow-x:auto;">
    <table class="standings">
      <thead><tr>
        <th class="left place">#</th>
        <th class="left player-cell">Игрок</th>
        <th>Σ</th><th>WPTS</th><th>Σap</th>
        <th title="мирный: победы/игры">R</th><th title="шериф">S</th><th title="мафия">B</th><th title="дон">D</th>
        <th title="убит 1-й ночью">K</th><th>Игр</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>`;
  document.getElementById('tbody').innerHTML = cur.rows.map((r,i) => {
    let delta = '';
    if (prev && prevPlace[r.name]) {
      const d = prevPlace[r.name] - r.place;
      delta = d>0 ? `<span class="delta up">▲${d}</span>` : d<0 ? `<span class="delta dn">▼${-d}</span>` : `<span class="delta eq">·</span>`;
    }
    return `<tr${i<3?' class="top-3"':''}>
      <td class="left place">${r.place}${delta}</td>
      <td class="left player-cell"><a class="player-name" href="player.html?nick=${encodeURIComponent(r.name)}&t=${T}">${escapeHtml(r.name)}</a></td>
      <td>${numCell(r.sigma,'big')}</td>
      <td>${numCell(r.wpts)}</td>
      <td>${numCell(+r.aps.toFixed(2), r.aps>0?'':'dim')}</td>
      ${ratioCell(r.roles.Citizen)}${ratioCell(r.roles.Sheriff)}${ratioCell(r.roles.Mafia)}${ratioCell(r.roles.Don)}
      <td>${numCell(r.k, r.k>0?'neg':'dim')}</td>
      <td>${numCell(r.games)}</td>
    </tr>`;
  }).join('');
  document.querySelectorAll('.gsel button').forEach(b => b.addEventListener('click', () => { sliderN = +b.dataset.n; renderLive(); }));
  const bo = document.getElementById('back-official');
  if (bo) bo.addEventListener('click', () => renderMain());
}
function ratioCell(r) {
  if (!r || !r.g) return '<td><span class="ratio zero">—</span></td>';
  const cls = r.w === r.g ? 'good' : r.w === 0 ? 'bad' : 'mid';
  return `<td><span class="ratio ${cls}">${r.w}<span class="of">/${r.g}</span></span></td>`;
}

/* ════ Завершённые турниры (622): официальные стадии ════ */
function renderMeta() {
  const fmt = (k, v) => v ? `<div class="k">${k}</div><div class="v">${v}</div>` : '';
  const live = DATA.in_progress ? `<span class="live-badge">LIVE</span>` : '';
  document.getElementById('title').innerHTML = `Сводная <span class="acc">· турнир ${DATA.tournament_id}</span>${live}`;
  const progress = DATA.games_played != null
    ? `Сыграно ${GAMES?.games?.length ?? DATA.games_played}/${DATA.games_total} игр`
    : (DATA.closed ? 'Турнир завершён' : '');
  document.getElementById('subtitle').textContent = `${DATA.tournament_name}${progress ? ' · ' + progress : ''}`;
  document.getElementById('meta').innerHTML = [
    fmt('Название', DATA.tournament_name),
    fmt('Дата', DATA.date),
    fmt('Место', DATA.location),
    fmt('Формат', DATA.format),
    fmt('Клуб', DATA.club),
    fmt('Организатор', DATA.organizer),
    fmt('Игроков', DATA.players_total),
    fmt('Призовой фонд', DATA.prize_fund_eur ? DATA.prize_fund_eur + ' EUR' : null),
    DATA.winners?.length ? fmt('Победители', DATA.winners.map(linkPlayer).join(' · ')) : ''
  ].filter(Boolean).join('');
}
function linkPlayer(nick) {
  return `<a class="award-name" href="player.html?nick=${encodeURIComponent(nick)}&t=${T}">${escapeHtml(nick)}</a>`;
}
function renderAwards() {
  if (!DATA.awards || !Object.keys(DATA.awards).length) {
    document.getElementById('awards-card').style.display = 'none';
    return;
  }
  const html = Object.entries(DATA.awards).map(([key, list]) => {
    const items = list.map((item, i) => {
      const m = item.match(/^(.+?)\s*\((.+)\)\s*$/);
      const name = m ? m[1].trim() : item;
      const val = m ? m[2] : '';
      const medalClass = ['gold','silver','bronze'][i] || '';
      return `<div class="award-item"><span class="award-medal ${medalClass}">${i+1}</span>${linkPlayer(name)}<span class="award-val">${val}</span></div>`;
    }).join('');
    return `<div class="award-row"><div class="award-cat">${AWARD_LABELS[key]||key}</div><div class="award-list">${items}</div></div>`;
  }).join('');
  document.getElementById('awards').innerHTML = html;
}
function renderMain() {
  const stages = Object.keys(STAGE_LABELS).filter(k => DATA.standings[k]?.length);
  const stageHtml = stages.length > 1 ? `<div class="stages">${stages.map(s => {
    const active = s === currentStage ? ' active' : '';
    return `<button class="stage-btn${active}" data-stage="${s}">${STAGE_LABELS[s]}<span class="count">${DATA.standings[s].length}</span></button>`;
  }).join('')}</div>` : '';
  const dynBtn = (GAMES && GAMES.games?.length) ? `<div style="margin-bottom:14px;"><button class="stage-btn" id="dyn-btn">📈 Динамика по играм (1–${GAMES.games.length})</button></div>` : '';
  document.getElementById('main').innerHTML = `${stageHtml}${dynBtn}<div class="card" style="padding:0;overflow-x:auto;">
    <table class="standings">
      <thead><tr>
        <th class="left place">#</th>
        <th class="left player-cell">Игрок</th>
        <th>Σ</th><th>WPTS</th><th>Σap</th><th>+</th><th>−</th><th>BM</th><th>Ci</th>
        <th>W</th><th>D</th><th>S</th><th>K</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>`;
  const dyn = document.getElementById('dyn-btn');
  if (dyn) dyn.addEventListener('click', () => { sliderN = GAMES.games.length; renderLive(true); });
  document.querySelectorAll('.stage-btn[data-stage]').forEach(b => b.addEventListener('click', () => {
    currentStage = b.dataset.stage;
    document.querySelectorAll('.stage-btn').forEach(x => x.classList.toggle('active', x === b));
    renderRows();
  }));
  renderRows();
}
function renderRows() {
  const rows = DATA.standings[currentStage] || [];
  document.getElementById('tbody').innerHTML = rows.map((r, i) => {
    return `<tr${i<3?' class="top-3"':''}>
      <td class="left place">${r.place}</td>
      <td class="left player-cell">
        <a class="player-name" href="player.html?nick=${encodeURIComponent(r.name)}&t=${T}">${escapeHtml(r.name)}</a>
        ${r.club ? `<span class="club">${escapeHtml(r.club)}</span>` : ''}
      </td>
      <td>${numCell(r.sigma, 'big')}</td>
      <td>${numCell(r.wpts != null ? r.wpts : '—')}</td>
      <td>${numCell(r.sigma_ap)}</td>
      <td>${numCell(r.plus, r.plus > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.minus, r.minus > 0 ? 'neg' : 'dim')}</td>
      <td>${numCell(r.bm, r.bm > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.ci, r.ci > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.w)}</td>
      <td>${numCell(r.d, r.d > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.s, r.s > 0 ? '' : 'dim')}</td>
      <td>${numCell(r.k, r.k > 0 ? '' : 'dim')}</td>
    </tr>`;
  }).join('');
}
function numCell(v, cls='') {
  if (v === '—') return '<span class="num dim">—</span>';
  const n = Number(v);
  if (isNaN(n)) return '—';
  const str = Number.isInteger(n) ? n.toString() : n.toFixed(2).replace(/\.?0+$/, '');
  return `<span class="num ${cls}">${str || '0'}</span>`;
}
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
load().catch(e => { document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#e8716b;">Ошибка: ' + e.message + '</div>'; console.error(e); });
</script>
</body>
</html>
