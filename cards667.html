<!DOCTYPE html>
<html lang="ru">
<head>
<!-- MafgameStat · cards667.html · v1.4 · 2026-06-14 · карточки 70 игроков Cyprus Open 667: фото, клуб, столы, слоты, соперники + раскрывающийся маршрут по играм (клик) + плавающая кнопка «наверх» -->
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Карточки игроков — Cyprus Open: Summer</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{margin:0;font-family:'Manrope',sans-serif;color:#0c3a5e;min-height:100vh;padding:18px 12px 60px;
    background:linear-gradient(180deg,#a7ddf8 0%,#7cc8ef 26%,#4cb4dc 46%,#2ba6cb 56%,#bfe2e0 62%,#f1ddb0 78%,#e9cf96 100%) fixed;}
  .topbar{max-width:760px;margin:0 auto 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .nav-btn{padding:9px 14px;background:rgba(255,255,255,.7);border:1px solid rgba(13,108,174,.35);color:#0d5d9e;border-radius:10px;font-size:13px;font-weight:800;text-decoration:none;}
  .nav-btn:hover{background:#0d6cae;color:#fff;}
  h1{font-family:'Lilita One',sans-serif;font-weight:400;font-size:23px;color:#0d5d9e;margin:6px 0 2px;text-shadow:0 1px 0 rgba(255,255,255,.7);}
  .sub{font-size:12.5px;color:#155a86;}
  .toc{max-width:760px;margin:0 auto 18px;background:rgba(255,255,255,.7);border-radius:14px;padding:12px 16px;font-size:12px;line-height:2;box-shadow:0 8px 22px rgba(13,71,128,.15);}
  .toc a{color:#0d6cae;text-decoration:none;font-weight:700;white-space:nowrap;}
  .toc a:hover{text-decoration:underline;}
  .card{max-width:560px;margin:0 auto 22px;background:rgba(255,255,255,.88);border:1px solid rgba(255,255,255,.95);border-radius:20px;
    box-shadow:0 12px 30px rgba(13,71,128,.2);padding:18px 18px 14px;backdrop-filter:blur(5px);}
  .hdr{display:flex;align-items:center;gap:14px;margin-bottom:12px;}
  .avatar{width:64px;height:64px;border-radius:50%;object-fit:cover;border:3px solid #fff;box-shadow:0 4px 12px rgba(13,71,128,.3);background:#d6ecf8;flex:none;}
  .nick{font-family:'Lilita One',sans-serif;font-size:21px;color:#0d5d9e;line-height:1.1;}
  .real{font-size:12px;color:#155a86;margin-top:2px;}
  .club{font-size:11px;color:#3d83ab;margin-top:2px;}
  .tmeta{font-size:10.5px;color:#3d83ab;margin-top:3px;}
  .sec{font-size:10px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:#0d6cae;margin:10px 0 6px;}
  .tables-row{display:flex;gap:6px;flex-wrap:wrap;}
  .tchip{padding:5px 10px;border-radius:9px;background:rgba(124,200,239,.25);border:1px solid rgba(13,108,174,.25);font-size:11.5px;font-weight:700;}
  .tchip b{color:#0d5d9e;}
  .slots{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
  .slot{text-align:center;padding:4px 0;border-radius:7px;background:rgba(124,200,239,.18);border:1px solid rgba(13,108,174,.18);}
  .slot .n{font-size:9px;color:#3d83ab;}
  .slot .c{font-size:12px;font-weight:800;color:#0d5d9e;}
  .slot.zero{opacity:.35;}
  .opp{font-size:11.5px;line-height:1.7;}
  .opp b{color:#0d5d9e;}
  .opp .cnt{display:inline-block;min-width:18px;text-align:center;background:#0d6cae;color:#fff;border-radius:6px;font-size:10px;font-weight:800;padding:1px 4px;margin-right:6px;}
  .foot{font-size:10px;color:#3d83ab;margin-top:10px;text-align:right;}
  .up-btn{position:fixed;right:16px;bottom:16px;z-index:50;width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
    background:#0d6cae;color:#fff;font-size:22px;box-shadow:0 6px 18px rgba(13,71,128,.4);display:none;align-items:center;justify-content:center;}
  .up-btn.show{display:flex;}
  .route-toggle{margin-top:10px;width:100%;padding:9px;border-radius:10px;cursor:pointer;font-size:12px;font-weight:800;
    background:rgba(13,108,174,.1);border:1px solid rgba(13,108,174,.3);color:#0d6cae;}
  .route-toggle:hover{background:#0d6cae;color:#fff;}
  .route{display:none;margin-top:10px;border:1px solid rgba(13,108,174,.2);border-radius:10px;overflow:hidden;}
  .route.open{display:block;}
  .route table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .route td{padding:6px 10px;border-bottom:1px solid rgba(13,108,174,.1);}
  .route tr:last-child td{border-bottom:none;}
  .route td:first-child{color:#155a86;font-weight:700;}
  .route td:nth-child(2){color:#3d83ab;}
  .route td:last-child{text-align:right;font-weight:800;color:#0d5d9e;}
</style>
</head>
<body>
<div class="topbar">
  <a class="nav-btn" href="tournament.html?t=667">← Турнир</a>
  <a class="nav-btn" href="seating667.html">Рассадка</a>
  <div>
    <h1>Карточки игроков · Cyprus Open: Summer</h1>
    <div class="sub">13–14 июня 2026 · Лимассол · 70 игроков · 12 игр квалификации + финал 4 игры</div>
  </div>
</div>
<div class="toc" id="toc"></div>
<div id="cards"></div>
<button class="up-btn" id="upBtn" title="Наверх" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<script src="data/live.js"></script>
<script>
window.addEventListener('scroll',()=>{const b=document.getElementById('upBtn');if(b)b.classList.toggle('show',window.scrollY>600);});
</script>
<script>
const ROMAN=['','I','II','III','IV','V','VI','VII'];
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
Promise.all([
  window.loadGames('667'),
  fetch('data/avatars_667.json').then(r=>r.json()),
  fetch('data/tournament_667.json').then(r=>r.json()),
  fetch('data/elo_667.json').then(r=>r.ok?r.json():null).catch(()=>null)
]).then(([G,A,T,E])=>{
  const ELO=(E&&E.players)||{};
  const AV=A.avatars||{};
  const INFO={}; (T.players||[]).forEach(p=>INFO[p.name]=p);
  const occ={}, opp={};
  G.games.forEach((g,gi)=>g.tables.forEach(t=>{
    const names=t.seats.map(s=>s.name);
    names.forEach((n,i)=>{
      (occ[n]=occ[n]||[]).push({g:gi+1,t:t.table_num,slot:i+1});
      names.forEach(m=>{ if(m!==n){ (opp[n]=opp[n]||{})[m]=(opp[n][m]||0)+1; } });
    });
  }));
  const players=Object.keys(occ).sort((a,b)=>a.localeCompare(b,'ru'));
  if(players.length!==70) console.warn('игроков на карточках:',players.length,'(70 заявлены + замены)');
  document.getElementById('toc').innerHTML='<b>Игроки ('+players.length+'):</b> '+players.map(p=>`<a href="#p-${encodeURIComponent(p)}">${esc(p)}</a>`).join(' · ');
  document.getElementById('cards').innerHTML=players.map(p=>{
    const o=occ[p];
    const tc={}; o.forEach(x=>tc[x.t]=(tc[x.t]||0)+1);
    const sc={}; o.forEach(x=>sc[x.slot]=(sc[x.slot]||0)+1);
    const groups={};
    Object.entries(opp[p]).forEach(([m,c])=>{ (groups[c]=groups[c]||[]).push(m); });
    let oppHtml=Object.keys(groups).sort((a,b)=>b-a).slice(0,5).map(c=>`<div><span class="cnt">${c}</span>${groups[c].sort((x,y)=>x.localeCompare(y,'ru')).map(esc).join(', ')}</div>`).join('');
    const zeros=players.filter(m=>m!==p && !(opp[p]||{})[m]);
    if(zeros.length) oppHtml+=`<div style="opacity:.65"><span class="cnt" style="background:#8aa6b8">0</span>${zeros.sort((x,y)=>x.localeCompare(y,'ru')).map(esc).join(', ')}</div>`;
    const info=INFO[p]||{};
    return `<div class="card" id="p-${esc(p)}">
      <div class="hdr">
        <img class="avatar" src="${esc(AV[p]||'')}" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='https://mafgame.org/build/assets/avatar-default2-33e44bae.png'">
        <div>
          <div class="nick">${esc(p)}</div>
          ${info.real?`<div class="real">${esc(info.real)}</div>`:''}
          ${info.club?`<div class="club">${esc(info.club)}</div>`:''}
          <div class="tmeta">Four Seasons. Cyprus Open: Summer · 13–14.06.2026 · Лимассол</div>
          ${ELO[p]&&ELO[p].global?`<div class="tmeta"><b>ELO ${ELO[p].global}</b> · за 12 мес ${ELO[p].year||'—'}${ELO[p].tournaments?` · турнир №${ELO[p].tournaments}`:''}</div>`:''}
        </div>
      </div>
      <div class="sec">Столы (${o.length} игр)</div>
      <div class="tables-row">${Object.keys(tc).sort((a,b)=>a-b).map(t=>`<span class="tchip">Стол <b>${ROMAN[t]}</b> · ${tc[t]}</span>`).join('')}</div>
      <div class="sec">Слоты 1–10</div>
      <div class="slots">${Array.from({length:10},(_,i)=>`<div class="slot${sc[i+1]?'':' zero'}"><div class="n">${i+1}</div><div class="c">${sc[i+1]||0}</div></div>`).join('')}</div>
      <div class="sec">Соперники (общих игр)</div>
      <div class="opp">${oppHtml}</div>
      <button class="route-toggle" onclick="this.nextElementSibling.classList.toggle('open');this.textContent=this.nextElementSibling.classList.contains('open')?'Скрыть маршрут ▲':'Мой маршрут по играм ▼';">Мой маршрут по играм ▼</button>
      <div class="route"><table>${o.sort((a,b)=>a.g-b.g).map(x=>`<tr><td>Игра ${x.g}</td><td>стол ${ROMAN[x.t]}</td><td>место ${x.slot}</td></tr>`).join('')}</table></div>
      <div class="foot">mafgame.org/667 · MafgameStat</div>
    </div>`;
  }).join('');
});
</script>
</body>
</html>
