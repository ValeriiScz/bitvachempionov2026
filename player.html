<!DOCTYPE html>
<html lang="ru">
<head>
<!-- MafgameStat · player.html · v2.6 · 2026-06-14 · фото, стата по 4 ролям, место после каждой игры, сравнение топ-10/11-20/среднее -->
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Игрок — Битва Чемпионов 2026</title>
<style>
  :root{--accent:#ffb84d;}
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{margin:0;background:radial-gradient(circle at 50% 0%,#1a1d2e 0%,#0a0c18 60%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:24px 16px 60px;}
  .topbar{max-width:980px;margin:0 auto 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .nav-btn{padding:9px 16px;background:rgba(255,184,77,.12);border:1px solid var(--accent);color:var(--accent);border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block;transition:.15s;}
  .nav-btn:hover{background:var(--accent);color:#1a1d2e;}
  .nav-btn.muted{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#dfe2f0;}
  .nav-btn.muted:hover{background:rgba(255,255,255,.10);color:#fff;}
  .wrap{max-width:980px;margin:0 auto;}
  .player-hdr{padding:28px;background:linear-gradient(180deg,#1a1d2e 0%,#232744 100%);border-radius:20px;display:flex;align-items:center;gap:22px;box-shadow:0 8px 32px rgba(0,0,0,.35);margin-bottom:20px;border:1px solid rgba(255,255,255,.04);}
  .player-avatar{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--accent) 0%,#d18a4a 100%);display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:800;color:#1a1d2e;flex-shrink:0;}
  .player-nick{font-size:36px;font-weight:800;letter-spacing:-.6px;color:#fff;}
  .player-club{font-size:13px;color:#a0a4b8;margin-top:6px;}
  .player-overall{margin-top:14px;display:flex;gap:18px;flex-wrap:wrap;}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;background:rgba(255,184,77,.12);border:1px solid rgba(255,184,77,.3);color:var(--accent);border-radius:20px;font-size:12px;font-weight:700;}
  .pill .v{color:#fff;font-weight:800;}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;}
  @media (max-width:700px){ .grid{grid-template-columns:1fr;} }
  .card{background:linear-gradient(180deg,#1a1d2e 0%,#232744 100%);border-radius:18px;padding:22px;box-shadow:0 8px 32px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.04);margin-bottom:16px;}
  .card h3{margin:0 0 14px;font-size:11px;font-weight:700;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px;}
  .places{display:flex;flex-direction:column;gap:10px;}
  .place-row{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.04);}
  .place-row.skipped{opacity:.45;}
  .place-row.podium{background:rgba(255,184,77,.10);border-color:rgba(255,184,77,.3);}
  .place-stage{font-size:13px;color:#dfe2f0;font-weight:600;}
  .place-val{font-size:20px;font-weight:800;color:#fff;font-variant-numeric:tabular-nums;}
  .place-val .of{color:#8a8fa8;font-size:13px;font-weight:600;margin-left:2px;}
  .place-val.none{color:#5a5e76;font-size:14px;}
  .noms{display:flex;flex-direction:column;gap:8px;}
  .nom-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:rgba(255,184,77,.08);border:1px solid rgba(255,184,77,.25);border-radius:10px;}
  .nom-medal{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;flex-shrink:0;}
  .nom-medal.gold{background:var(--accent);color:#1a1d2e;}
  .nom-medal.silver{background:#c5cad8;color:#1a1d2e;}
  .nom-medal.bronze{background:#d18a4a;color:#1a1d2e;}
  .nom-cat{flex:1;font-size:13px;color:#fff;font-weight:600;}
  .nom-val{font-size:12px;color:#8a8fa8;font-variant-numeric:tabular-nums;}
  .no-noms{color:#5a5e76;font-size:13px;font-style:italic;}
  table.stats, table.games-table{width:100%;border-collapse:collapse;font-size:13px;}
  table.stats th, table.games-table th{color:#8a8fa8;font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;padding:8px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.08);}
  table.stats th.left, table.games-table th.left{text-align:left;}
  table.stats td, table.games-table td{padding:10px 6px;border-bottom:1px solid rgba(255,255,255,.04);text-align:right;font-variant-numeric:tabular-nums;font-weight:600;color:#dfe2f0;}
  table.stats td.left, table.games-table td.left{text-align:left;color:#fff;font-weight:700;}
  table.stats td.dim, table.games-table td.dim{color:#5a5e76;}
  table.stats tbody tr:nth-child(even) td{background:rgba(255,255,255,.022);}
  table.stats td.neg, table.games-table td.neg{color:#e8716b;}
  table.stats td.big, table.games-table td.big{color:var(--accent);font-weight:800;}
  table.stats tr.total td{border-top:2px solid rgba(255,184,77,.25);font-size:14px;font-weight:800;color:#fff;}
  table.games-table .role-pill{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:12px;font-size:11px;font-weight:700;}
  .role-pill svg{width:14px;height:14px;}
  .role-citizen{background:rgba(255,94,94,.12);color:#ff8a8a;} .role-citizen svg{color:#ff5e5e;}
  .role-sheriff{background:rgba(255,210,74,.12);color:#ffd24a;} .role-sheriff svg{color:#ffd24a;}
  .role-mafia{background:rgba(223,226,240,.10);color:#dfe2f0;} .role-mafia svg{color:#dfe2f0;}
  .role-don{background:rgba(255,210,74,.10);color:#ffd9a3;border:1px solid rgba(255,210,74,.35);} .role-don svg{color:#ffd9a3;}
  .result-W{color:#3fd17a;font-weight:800;}
  .result-L{color:#e8716b;font-weight:700;}
  .game-link{color:#5dd1ff;text-decoration:none;font-weight:700;}
  .game-link:hover{text-decoration:underline;}
  .first-killed-mark{color:#a0a4b8;font-size:14px;}
  .all-players{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:8px;}
  .all-players a{display:block;padding:10px 14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:10px;color:#fff;text-decoration:none;font-size:13px;font-weight:600;transition:.15s;}
  .all-players a:hover{background:rgba(255,184,77,.12);border-color:var(--accent);color:var(--accent);}
  .all-players a{display:flex;align-items:center;gap:10px;}
  .all-players a .rk{color:var(--accent);min-width:26px;text-align:right;flex:none;}
  .all-players a .sg{margin-left:auto;color:var(--accent);font-weight:800;}
  .pnav{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px;}
  .player-jump{flex:1;min-width:180px;max-width:340px;padding:9px 12px;background:#141728;color:#fff;border:1px solid rgba(255,184,77,.35);border-radius:8px;font-size:13px;font-weight:600;}
  .empty{padding:40px;text-align:center;color:#8a8fa8;}
  .todo{margin-top:14px;padding:12px 14px;background:rgba(255,184,77,.06);border:1px dashed rgba(255,184,77,.3);border-radius:10px;font-size:12px;color:#a0a4b8;line-height:1.6;}
  .todo strong{color:var(--accent);}
  .info{padding:12px 14px;background:rgba(93,209,255,.06);border:1px dashed rgba(93,209,255,.3);border-radius:10px;font-size:12px;color:#a0a4b8;line-height:1.6;margin-bottom:14px;}
  .info strong{color:#5dd1ff;}
  .player-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;}
  .role-cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  .rc{padding:12px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;}
  .rc-hdr{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:800;margin-bottom:8px;}
  .rc-hdr .role-icon-lg{width:24px;height:24px;display:inline-flex;align-items:center;justify-content:center;}
  .rc-hdr .role-icon-lg svg{width:20px;height:20px;}
  .rc.role-citizen .rc-hdr{color:#ff8a8a;}
  .rc.role-sheriff .rc-hdr{color:#ffd24a;}
  .rc.role-mafia .rc-hdr{color:#c5cad8;}
  .rc.role-don .rc-hdr{color:#9fb3ff;}
  .rc-rows{display:grid;grid-template-columns:1fr auto;gap:4px 10px;font-size:11.5px;color:#8a8fa8;}
  .rc-rows b{color:#fff;font-variant-numeric:tabular-nums;font-weight:700;text-align:right;}
  .rc.none{opacity:.4;}
  .prog-wrap{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;}
  .prog-step{text-align:center;padding:8px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:10px;min-width:58px;}
  .prog-step .g{font-size:9.5px;color:#5a5e76;text-transform:uppercase;letter-spacing:1px;}
  .prog-step .p{font-size:17px;font-weight:800;color:#fff;margin-top:2px;}
  .prog-step .d{font-size:10px;font-weight:800;margin-top:1px;}
  .prog-step .d.up{color:#3fd17a;}.prog-step .d.dn{color:#e8716b;}.prog-step .d.eq{color:#5a5e76;}
  .prog-step.cur{border-color:var(--accent);background:rgba(255,184,77,.10);}
  .prog-step.cur .p{color:var(--accent);}
  .prog-step.fin{border-color:rgba(255,184,77,.5);background:rgba(255,184,77,.06);}
  .prog-step.fin .g{color:var(--accent);}
  table.cmp{width:100%;border-collapse:collapse;font-size:13px;}
  table.cmp th{color:#8a8fa8;font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:8px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.08);}
  table.cmp th.left,table.cmp td.left{text-align:left;}
  table.cmp td{padding:9px 6px;text-align:right;border-bottom:1px solid rgba(255,255,255,.04);font-variant-numeric:tabular-nums;color:#dfe2f0;}
  table.cmp tr.me td{background:rgba(255,184,77,.08);color:#fff;font-weight:700;}
  table.cmp tr.me td.left{color:var(--accent);}
  a.ytmini{display:inline-block;font-size:10px;font-weight:800;padding:2px 7px;border-radius:7px;text-decoration:none;background:rgba(255,0,0,.10);border:1px solid rgba(255,70,70,.4);color:#ff6b6b;}
  a.ytmini:hover{background:#e02424;color:#fff;}
  .card{overflow-x:auto;}
  table.games-table,table.stats,table.cmp{min-width:480px;}
</style>
</head>
<body>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="ic-citizen" viewBox="0 0 24 24"><path d="M12 21.3l-1.5-1.4C5.4 15.4 2 12.3 2 8.5 2 5.4 4.4 3 7.5 3c1.7 0 3.4.8 4.5 2.1C13.1 3.8 14.8 3 16.5 3 19.6 3 22 5.4 22 8.5c0 3.8-3.4 6.9-8.5 11.5L12 21.3z" fill="currentColor"/></symbol>
  <symbol id="ic-sheriff" viewBox="0 0 24 24"><path d="M12 1.8l2.6 5.6 6.1.7-4.5 4.2 1.2 6-5.4-3-5.4 3 1.2-6-4.5-4.2 6.1-.7L12 1.8z" fill="currentColor" stroke="rgba(0,0,0,.35)" stroke-width=".6" stroke-linejoin="round"/></symbol>
  <symbol id="ic-mafia" viewBox="0 0 32 24"><path d="M2 8h16v3h2l1-3h6v3h2v4h-2v1l-3 3h-4v2l-1 1h-6l-1-2-1-2H4l-2-2V8z" fill="currentColor"/><rect x="6" y="14" width="6" height="2" fill="#0a0c18"/></symbol>

</defs></svg>

<div class="topbar">
  <a class="nav-btn muted" id="link-tournament" href="./">← Турнир</a>
  <a class="nav-btn muted" href="standings.html" id="link-standings">К сводной</a>
  <a class="nav-btn muted" href="results.html" id="link-results">Игры</a>
  <a class="nav-btn muted" href="roles.html" id="link-roles">По ролям</a>
</div>

<div class="wrap" id="content"><div class="card empty">Загрузка…</div></div>

<script src="data/streams.js"></script>
<script src="data/live.js"></script>
<script>
const T = new URLSearchParams(location.search).get('t') || '826';
const STAGE_INFO = [
  {key:'qualification', label:'Квалификация'},
  {key:'semifinal', label:'Полуфинал'},
  {key:'final', label:'Финал'}
];
const AWARD_LABELS = {
  most_valuable_players:'MVP турнира', most_valuable_mafia:'Лучшая мафия',
  most_valuable_citizen:'Лучший мирный', best_don:'Лучший дон',
  best_sheriff:'Лучший шериф', most_killed:'Чаще всех убит 1-й ночью'
};
const ROLE_ICON_ID = {Citizen:'ic-citizen',Sheriff:'ic-sheriff',Don:'ic-don',Mafia:'ic-mafia'};
const ROLE_CLASS = {Citizen:'role-citizen',Sheriff:'role-sheriff',Mafia:'role-mafia',Don:'role-don'};
function roleSvg(role) { return `<svg><use href="#${ROLE_ICON_ID[role] || 'ic-citizen'}"/></svg>`; }
let DATA = null, GAMES = null, AV = {};

async function load() {
  document.getElementById('link-tournament').href = `tournament.html?t=${T}`;
  document.getElementById('link-standings').href = `standings.html?t=${T}`;
  document.getElementById('link-results').href = `results.html?t=${T}`;
  document.getElementById('link-roles').href = `roles.html?t=${T}`;
  const [r1, r2] = await Promise.all([
    fetch(`data/tournament_${T}.json`).then(r => r.ok ? r.json() : Promise.reject('Нет tournament_'+T)),
    window.loadGames(T)
  ]);
  DATA = r1;
  if (DATA.accent) document.documentElement.style.setProperty('--accent', DATA.accent);
  GAMES = r2;
  try { const a = await fetch(`data/avatars_${T}.json`); if (a.ok) AV = (await a.json()).avatars || {}; } catch(e) {}
  const nick = new URLSearchParams(location.search).get('nick');
  if (nick) renderPlayer(nick); else renderAllPlayers();
}

function ratingOrdered() {
  if (DATA && DATA.standings && DATA.standings.total && DATA.standings.total.length) {
    return DATA.standings.total.map(r => ({name: r.name, place: parseInt(r.place, 10), sigma: r.sigma}));
  }
  if (GAMES && GAMES.games && GAMES.games.length) {
    const n = (GAMES.games_played != null ? GAMES.games_played : GAMES.games.length);
    return liveStandings(n).map(r => ({name: r.name, place: r.place, sigma: r.sigma}));
  }
  return (DATA.players || []).slice().sort((a,b) => a.name.localeCompare(b.name,'ru')).map(p => ({name: p.name, place: null, sigma: null}));
}
function renderAllPlayers() {
  document.title = `Все игроки · турнир ${T}`;
  const list = ratingOrdered();
  const ranked = list.length && list[0].place != null;
  document.getElementById('content').innerHTML = `
    <div class="card">
      <h3>Игроки турнира ${T} (${list.length})${ranked ? ' · по текущему рейтингу' : ''}</h3>
      <div class="all-players">
        ${list.map(p => `<a href="?nick=${encodeURIComponent(p.name)}&t=${T}">${p.place != null ? `<b class="rk">${p.place}</b> ` : ''}<span class="nm">${escapeHtml(p.name)}</span>${p.sigma != null ? `<span class="sg">${fmtNum(p.sigma)}</span>` : ''}</a>`).join('')}
      </div>
    </div>`;
}

function renderPlayer(nick) {
  const player = (DATA.players || []).find(p => p.name === nick);
  if (!player) {
    document.getElementById('content').innerHTML = `<div class="card empty">Игрок <strong>${escapeHtml(nick)}</strong> не найден в турнире ${T}.<br><br><a class="nav-btn" href="player.html?t=${T}">Все игроки ${T}</a></div>`;
    return;
  }
  document.title = `${nick} — Битва Чемпионов 2026`;

  // Активные стадии этого турнира
  const stages = STAGE_INFO.filter(s => DATA.standings?.[s.key]?.length);
  const totalRow = DATA.standings?.total?.find(r => r.name === nick) || null;
  const totalSize = DATA.standings?.total?.length || 0;
  const totalPos = totalRow ? parseInt(totalRow.place, 10) : null;
  const totalPlaceRow = totalPos ? `<div class="place-row${totalPos<=3?' podium':''}" style="border-color:rgba(255,184,77,.45);"><span class="place-stage" style="color:var(--accent);font-weight:800;">Итог (официально)</span><span class="place-val">#${totalPos}<span class="of"> / ${totalSize}</span></span></div>` : '';
  const stageData = {};
  stages.forEach(s => {
    s.size = DATA.standings[s.key].length;
    stageData[s.key] = DATA.standings[s.key].find(r => r.name === nick) || null;
  });

  const sum = (field) => stages.reduce((acc, s) => acc + (stageData[s.key]?.[field] || 0), 0);
  const total_sigma = sum('sigma');
  const total_w = sum('w');
  const total_d = sum('d');
  const total_s = sum('s');
  const total_k = sum('k');
  const stages_played = stages.filter(s => stageData[s.key]).length;
  const total_games = sum('games');

  const myNoms = [];
  Object.entries(DATA.awards || {}).forEach(([key, list]) => {
    list.forEach((item, i) => {
      const name = (item.match(/^(.+?)\s*\(/) || [])[1]?.trim() || item;
      if (name === nick) {
        const val = (item.match(/\((.+)\)/) || [])[1] || '';
        myNoms.push({cat: key, place: i+1, val});
      }
    });
  });

  const myGames = [];
  if (GAMES?.games) {
    GAMES.games.slice(0, (GAMES.games_played != null ? GAMES.games_played : GAMES.games.length)).forEach((g, gi) => {
      (g.tables || []).forEach(t => {
        const seat = (t.seats || []).find(s => s.name === nick);
        if (seat) myGames.push({game_title: g.title, game_idx: gi, stage: g.stage, table_num: t.table_num, winner: t.winner, ...seat});
      });
    });
  }

  let headSigma = total_sigma, headW = total_w, headGames = total_games;
  if (GAMES && myGames.length && (!stages.length || total_games === 0)) {
    headSigma = +myGames.reduce((a,g)=>a+(g.wpts||0)+(g.aps||0)+(g.ci||0),0).toFixed(2);
    headW = myGames.filter(g=>g.result==='W').length;
    headGames = myGames.length;
  }
  const initial = nick.charAt(0).toUpperCase();

  const jumpOpts = ratingOrdered().map(p => `<option value="${escapeHtml(p.name)}"${p.name === nick ? ' selected' : ''}>${p.place != null ? p.place + '. ' : ''}${escapeHtml(p.name)}${p.sigma != null ? ' — ' + fmtNum(p.sigma) : ''}</option>`).join('');

  const html = `
    <div class="pnav">
      <a class="nav-btn" href="player.html?t=${T}">← Ко всем игрокам</a>
      <select class="player-jump" onchange="if(this.value)location.href='?nick='+encodeURIComponent(this.value)+'&t=${T}'">${jumpOpts}</select>
    </div>
    <div class="player-hdr">
      <div class="player-avatar">${AV[nick] ? `<img src="${AV[nick]}" referrerpolicy="no-referrer" onerror="this.onerror=null;this.src='https://mafgame.org/build/assets/avatar-default2-33e44bae.png'">` : escapeHtml(initial)}</div>
      <div style="flex:1;">
        <div class="player-nick">${escapeHtml(nick)}</div>
        ${player.club ? `<div class="player-club">${escapeHtml(player.club)}</div>` : ''}
        <div class="player-overall">
          <span class="pill">Σ всего: <span class="v">${fmtNum(headSigma)}</span></span>
          ${totalPos ? `<span class="pill">Место: <span class="v">#${totalPos}<span style="opacity:.6"> / ${totalSize}</span></span></span>` : ''}
          ${stages.length > 1 ? `<span class="pill">Стадий: <span class="v">${stages_played}/${stages.length}</span></span>` : ''}
          <span class="pill">Побед: <span class="v">${headW}</span></span>
          ${headGames > 0 ? `<span class="pill">Игр: <span class="v">${headGames}</span></span>` : ''}
          ${total_d > 0 ? `<span class="pill">Дон: <span class="v">${total_d}</span></span>` : ''}
          ${total_s > 0 ? `<span class="pill">Шериф: <span class="v">${total_s}</span></span>` : ''}
          ${total_k > 0 ? `<span class="pill">Убит 1-й ночью: <span class="v">${total_k}</span></span>` : ''}
        </div>
      </div>
    </div>

    <div class="grid">
      ${GAMES && GAMES.games?.length ? progressionCard(nick) : `<div class="card">
        <h3>${stages.length > 1 ? 'Места по стадиям' : 'Место в турнире'}</h3>
        <div class="places">
          ${totalPlaceRow}
          ${stages.map(s => {
            const d = stageData[s.key];
            if (!d) return `<div class="place-row skipped"><span class="place-stage">${s.label}</span><span class="place-val none">не играл</span></div>`;
            const place = parseInt(d.place, 10);
            const podium = place <= 3 ? ' podium' : '';
            return `<div class="place-row${podium}"><span class="place-stage">${s.label}</span><span class="place-val">#${place}<span class="of"> / ${s.size}</span></span></div>`;
          }).join('')}
        </div>
      </div>`}
      ${GAMES && GAMES.games?.length ? roleStatsCard(myGames) : `<div class="card">
        <h3>Личные номинации</h3>
        ${myNoms.length === 0 ? `<div class="no-noms">${DATA.in_progress ? 'Awards появятся после закрытия турнира судьёй' : 'Не попал в топ-3 ни одной категории'}</div>` : `
          <div class="noms">
            ${myNoms.map(n => {
              const medalClass = ['gold','silver','bronze'][n.place-1];
              return `<div class="nom-row"><span class="nom-medal ${medalClass}">${n.place}</span><span class="nom-cat">${AWARD_LABELS[n.cat] || n.cat}</span><span class="nom-val">${escapeHtml(n.val)}</span></div>`;
            }).join('')}
          </div>
        `}
      </div>`}
    </div>

    ${GAMES && GAMES.games?.length && stages.length ? `<div class="grid">
      <div class="card">
        <h3>${stages.length > 1 ? 'Места по стадиям (официально)' : 'Место в турнире (официально)'}</h3>
        <div class="places">
          ${totalPlaceRow}
          ${stages.map(s => {
            const d = stageData[s.key];
            if (!d) return `<div class="place-row skipped"><span class="place-stage">${s.label}</span><span class="place-val none">не играл</span></div>`;
            const place = parseInt(d.place, 10);
            return `<div class="place-row${place<=3?' podium':''}"><span class="place-stage">${s.label}</span><span class="place-val">#${place}<span class="of"> / ${s.size}</span></span></div>`;
          }).join('')}
        </div>
      </div>
      <div class="card">
        <h3>Личные номинации</h3>
        ${myNoms.length === 0 ? `<div class="no-noms">${DATA.in_progress ? 'Awards появятся после закрытия турнира' : 'Не попал в топ-3 ни одной категории'}</div>` : `<div class="noms">${myNoms.map(n => {
          const mc = ['gold','silver','bronze'][n.place-1];
          return `<div class="nom-row"><span class="nom-medal ${mc}">${n.place}</span><span class="nom-cat">${AWARD_LABELS[n.cat] || n.cat}</span><span class="nom-val">${escapeHtml(n.val)}</span></div>`;
        }).join('')}</div>`}
      </div>
    </div>` : ''}

    ${renderGamesTable(myGames, nick)}

    ${stages.length > 0 ? `<div class="card">
      <h3>${stages.length > 1 ? 'Сводная стата по стадиям' : 'Сводная стата'}</h3>
      <table class="stats">
        <thead><tr>
          ${stages.length > 1 ? '<th class="left">Стадия</th>' : '<th class="left">Турнир</th>'}
          <th>Место</th><th>Σ</th><th>Σap</th><th>+</th><th>−</th><th>BM</th><th>Ci</th>
          <th>W</th><th>D</th><th>S</th><th>K</th>
        </tr></thead>
        <tbody>
          ${stages.map(s => {
            const d = stageData[s.key];
            if (!d) return `<tr><td class="left">${s.label}</td><td colspan="11" class="dim" style="text-align:center;">не играл</td></tr>`;
            return `<tr>
              <td class="left">${stages.length > 1 ? s.label : DATA.tournament_id}</td>
              <td>${d.place}</td>
              <td class="big">${fmtNum(d.sigma)}</td>
              <td>${fmtNum(d.sigma_ap)}</td>
              <td class="${d.plus > 0 ? '' : 'dim'}">${fmtNum(d.plus)}</td>
              <td class="${d.minus > 0 ? 'neg' : 'dim'}">${fmtNum(d.minus)}</td>
              <td class="${d.bm > 0 ? '' : 'dim'}">${fmtNum(d.bm)}</td>
              <td class="${d.ci > 0 ? '' : 'dim'}">${fmtNum(d.ci)}</td>
              <td>${d.w}</td>
              <td class="${d.d > 0 ? '' : 'dim'}">${d.d}</td>
              <td class="${d.s > 0 ? '' : 'dim'}">${d.s}</td>
              <td class="${d.k > 0 ? '' : 'dim'}">${d.k}</td>
            </tr>`;
          }).join('')}
          ${stages.length > 1 ? `<tr class="total">
            <td class="left">Итого</td>
            <td>${totalPos ? '#'+totalPos : '—'}</td>
            <td class="big">${fmtNum(total_sigma)}</td>
            <td>${fmtNum(sum('sigma_ap'))}</td>
            <td>${fmtNum(sum('plus'))}</td>
            <td>${fmtNum(sum('minus'))}</td>
            <td>${fmtNum(sum('bm'))}</td>
            <td>${fmtNum(sum('ci'))}</td>
            <td>${total_w}</td>
            <td>${total_d}</td>
            <td>${total_s}</td>
            <td>${total_k}</td>
          </tr>` : ''}
        </tbody>
      </table>
    </div>` : ''}

    ${GAMES && GAMES.games?.length ? compareCard(nick) : ''}
  `;
  document.getElementById('content').innerHTML = html;
}

function liveStandings(n) {
  const P = {};
  const get = name => P[name] || (P[name] = {name, wpts:0, aps:0, ci:0, w:0, games:0});
  GAMES.games.slice(0, n).forEach(g => (g.tables||[]).forEach(tb => (tb.seats||[]).forEach(x => {
    const p = get(x.name); p.games++; p.wpts += x.wpts||0; p.aps += x.aps||0; p.ci += x.ci||0; if (x.result==='W') p.w++;
  })));
  const rows = Object.values(P).map(p => ({...p, sigma:+(p.wpts+p.aps+p.ci).toFixed(2)}));
  rows.sort((a,b) => b.sigma - a.sigma || b.aps - a.aps || a.name.localeCompare(b.name,'ru'));
  rows.forEach((r,i) => r.place = i+1);
  return rows;
}
function progressionCard(nick) {
  const played = (GAMES.games_played != null ? GAMES.games_played : GAMES.games.length);
  let prev = null, steps = '';
  for (let n = 1; n <= played; n++) {
    const place = (liveStandings(n).find(r => r.name === nick) || {}).place;
    if (!place) continue;
    let d = '<span class="d eq">—</span>';
    if (prev != null) {
      const diff = prev - place;
      d = diff > 0 ? `<span class="d up">▲${diff}</span>` : diff < 0 ? `<span class="d dn">▼${-diff}</span>` : '<span class="d eq">·</span>';
    }
    steps += `<div class="prog-step${n===played?' cur':''}${n>12?' fin':''}"><div class="g">${n>12?'финал '+(n-12):'игра '+n}</div><div class="p">#${place}</div>${d}</div>`;
    prev = place;
  }
  return `<div class="card"><h3>Место после каждой игры</h3><div class="prog-wrap">${steps || '<span class="dim">нет данных</span>'}</div></div>`;
}
function roleStatsCard(myGames) {
  const ROLES = [['Citizen','Мирный'],['Sheriff','Шериф'],['Mafia','Мафия'],['Don','Дон']];
  const cards = ROLES.map(([key,label]) => {
    const gs = myGames.filter(g => g.role === key);
    const w = gs.filter(g => g.result === 'W').length;
    const wpts = gs.reduce((a,g) => a + (g.wpts||0), 0);
    const ap = gs.reduce((a,g) => a + (g.aps||0), 0);
    const ci = gs.reduce((a,g) => a + (g.ci||0), 0);
    const sig = wpts + ap + ci;
    if (!gs.length) return `<div class="rc ${ROLE_CLASS[key]} none"><div class="rc-hdr"><span class="role-icon-lg">${roleSvg(key)}</span>${label}</div><div class="rc-rows"><span>не играл</span><b>—</b></div></div>`;
    return `<div class="rc ${ROLE_CLASS[key]}">
      <div class="rc-hdr"><span class="role-icon-lg">${roleSvg(key)}</span>${label}</div>
      <div class="rc-rows">
        <span>Игры</span><b>${gs.length}</b>
        <span>Победы</span><b>${w}/${gs.length}</b>
        <span>Σ роли</span><b class="big">${fmtNum(sig)}</b>
        <span>WPTS</span><b>${fmtNum(wpts)}</b>
        <span>Доп${ap<0?' (с минусом)':''}</span><b>${fmtNum(ap)}</b>
        <span>Ci</span><b>${fmtNum(ci)}</b>
      </div>
    </div>`;
  }).join('');
  return `<div class="card"><h3>Стата по ролям</h3><div class="role-cards">${cards}</div></div>`;
}
function compareCard(nick) {
  const rows = liveStandings(GAMES.games_played != null ? GAMES.games_played : GAMES.games.length);
  const me = rows.find(r => r.name === nick);
  if (!me) return '';
  const avg = list => {
    const n = list.length || 1;
    return {w: list.reduce((a,r)=>a+r.w,0)/n, aps: list.reduce((a,r)=>a+r.aps,0)/n, sigma: list.reduce((a,r)=>a+r.sigma,0)/n};
  };
  const groups = [
    ['Топ-10 (среднее)', avg(rows.slice(0,10)), false],
    ['Места 11–20 (среднее)', avg(rows.slice(10,20)), false],
    ['Среднее по турниру', avg(rows), false],
    [`${nick} — место #${me.place}`, {w: me.w, aps: me.aps, sigma: me.sigma}, true]
  ];
  return `<div class="card"><h3>Как играет на фоне турнира</h3>
    <table class="cmp">
      <thead><tr><th class="left">Срез</th><th>Победы</th><th>Σap</th><th>Σ</th></tr></thead>
      <tbody>${groups.map(([label, g, isMe]) => `<tr${isMe?' class="me"':''}>
        <td class="left">${label}</td><td>${fmtNum(g.w)}</td><td>${fmtNum(g.aps)}</td><td>${fmtNum(g.sigma)}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function renderGamesTable(myGames, nick) {
  if (!GAMES) return '';
  if (myGames.length === 0) {
    return `<div class="card"><h3>Разбивка по играм</h3><div class="empty">${escapeHtml(nick)} ещё не сыграл ни одной из ${GAMES.games_played || 0} распарсенных игр</div></div>`;
  }
  const STAGES_ORDER = ['Квалификация','Финал'];
  const present = STAGES_ORDER.filter(st => myGames.some(g => g.stage === st));
  const stagesToShow = present.length ? present : [null];
  const word = n => (n % 10 === 1 && n % 100 !== 11) ? 'игра' : 'игр';
  const sectionFor = (st) => {
    const gs = st ? myGames.filter(g => g.stage === st) : myGames;
    if (!gs.length) return '';
    const rowsHtml = gs.map(g => `<tr>
        <td class="left"><a class="game-link" href="results.html?t=${T}">${escapeHtml(g.game_title)}</a></td>
        <td class="left">${g.table_num}</td>
        <td class="left"><span class="role-pill ${ROLE_CLASS[g.role] || ''}">${roleSvg(g.role)} ${g.role}</span></td>
        <td class="result-${g.result}">${g.result}</td>
        <td class="${g.wpts > 0 ? 'big' : 'dim'}">${fmtNum(g.wpts)}</td>
        <td class="${g.aps > 0 ? '' : (g.aps < 0 ? 'neg' : 'dim')}">${g.aps > 0 ? '+' : ''}${fmtNum(g.aps)}</td>
        <td class="${g.ci > 0 ? 'big' : 'dim'}">${fmtNum(g.ci)}</td>
        <td>${g.marker === 'first_killed' ? '<span class="first-killed-mark" title="убит первой ночью">💀</span>' : '<span class="dim">—</span>'}</td>
        <td>${(window.streamFor && streamFor(T, g.game_idx + 1, g.table_num)) ? `<a class="ytmini" href="${streamFor(T, g.game_idx + 1, g.table_num)}" target="_blank" rel="noopener">▶</a>` : '<span class="dim">—</span>'}</td>
      </tr>`).join('');
    const header = st ? `<div style="font-size:12px;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin:16px 0 6px;">${st} · ${gs.length} ${word(gs.length)}</div>` : '';
    return `${header}<table class="games-table">
      <thead><tr>
        <th class="left">Игра</th><th class="left">Стол</th><th class="left">Роль</th>
        <th>R</th><th>WPTS</th><th>APTS</th><th title="компенсация">Ci</th><th>1-я ночь</th><th>Стрим</th>
      </tr></thead>
      <tbody>
        ${rowsHtml}
        <tr class="total">
          <td class="left">Итого по ${gs.length}</td>
          <td colspan="2"></td>
          <td>${gs.filter(g => g.result === 'W').length}W / ${gs.filter(g => g.result === 'L').length}L</td>
          <td class="big">${fmtNum(gs.reduce((a, g) => a + g.wpts, 0))}</td>
          <td>${fmtNum(gs.reduce((a, g) => a + g.aps, 0))}</td>
          <td>${fmtNum(gs.reduce((a, g) => a + (g.ci||0), 0))}</td>
          <td>${gs.filter(g => g.marker === 'first_killed').length}</td>
          <td></td>
        </tr>
      </tbody>
    </table>`;
  };
  const totalSig = fmtNum(myGames.reduce((a,g)=>a+(g.wpts||0)+(g.aps||0)+(g.ci||0),0));
  const grand = present.length > 1 ? `<div class="info" style="margin-top:12px;">Итог по всем ${myGames.length} играм: <strong>Σ ${totalSig}</strong> · ${myGames.filter(g=>g.result==='W').length}W / ${myGames.filter(g=>g.result==='L').length}L.</div>` : '';
  return `<div class="card">
    <h3>Разбивка по играм (как в @mafgamer_bot)</h3>
    <div class="info">Сыграно ${GAMES.games_played}/${GAMES.games_total} игр турнира. ${escapeHtml(nick)} — в ${myGames.length}${present.length>1?'; квалификация и финал показаны раздельно':''}.</div>
    ${stagesToShow.map(sectionFor).join('')}
    ${grand}
  </div>`;
}

function fmtNum(v) { const n = Number(v); if (isNaN(n)) return '—'; if (n === 0) return '0'; return Number.isInteger(n) ? n.toString() : n.toFixed(2).replace(/\.?0+$/, ''); }
function escapeHtml(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
load().catch(e => { document.getElementById('content').innerHTML = `<div class="card empty" style="color:#e8716b;">Ошибка: ${e.message}</div>`; console.error(e); });
</script>
