<!DOCTYPE html>
<html lang="ru">
<head>
<!-- MafgameStat · markers.html · v1.0 · 2026-06-19 · матрица совместных посадок (кто с кем сколько раз за одним столом) из рассадки турнира -->
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Совместные посадки — MafgameStat</title>
<style>
  :root{--accent:#ffb84d;--gold:var(--accent);--mut:#a0a4b8;}
  *{box-sizing:border-box;}
  html,body{max-width:100%;}
  body{margin:0;background:radial-gradient(circle at 50% 0%,#1a1d2e 0%,#0a0c18 60%);color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:24px 16px 60px;}
  .wrap{max-width:1500px;margin:0 auto;}
  .topbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .nav-btn{padding:9px 16px;background:rgba(255,184,77,.12);border:1px solid var(--accent);color:var(--accent);border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;}
  .nav-btn.muted{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#dfe2f0;}
  .nav-btn.muted:hover{background:rgba(255,255,255,.1);color:#fff;}
  h1{font-size:24px;margin:6px 0 4px;}
  .sub{color:var(--mut);font-size:13px;margin-bottom:16px;}
  .legend{display:flex;gap:14px;align-items:center;flex-wrap:wrap;margin-bottom:14px;font-size:12px;color:var(--mut);}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}
  .tab{padding:8px 14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:#dfe2f0;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;}
  .tab.active{background:var(--gold);color:#1a1d2e;border-color:var(--gold);}
  .legend i{display:inline-block;width:18px;height:18px;border-radius:4px;vertical-align:-4px;margin-right:5px;}
  .card{background:linear-gradient(180deg,#1a1d2e,#232744);border-radius:16px;padding:0;overflow:auto;max-height:80vh;box-shadow:0 8px 32px rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.05);}
  table{border-collapse:separate;border-spacing:0;font-size:11px;}
  th,td{padding:0;text-align:center;}
  th.corner{position:sticky;left:0;top:0;z-index:5;background:#0a0c18;}
  thead th{position:sticky;top:0;z-index:4;background:#0a0c18;color:var(--mut);font-weight:700;height:96px;white-space:nowrap;}
  thead th .vname{display:inline-block;transform:rotate(-90deg);transform-origin:center;width:18px;font-size:11px;}
  tbody th{position:sticky;left:0;z-index:3;background:#11142a;color:#fff;font-weight:700;text-align:right;padding:0 10px 0 8px;white-space:nowrap;font-size:12px;min-width:120px;max-width:160px;overflow:hidden;text-overflow:ellipsis;}
  tbody td{width:30px;height:30px;min-width:30px;font-variant-numeric:tabular-nums;color:#0a0c18;font-weight:700;border:1px solid rgba(10,12,24,.4);}
  td.diag{background:#0a0c18 !important;color:#3a3d52;}
  td.zero{color:#e8716b;}
  a.pn{color:inherit;text-decoration:none;}
  tbody th a:hover{color:var(--gold);}
  .empty{padding:40px;text-align:center;color:var(--mut);}
</style>
<!-- PWA · 2026-07-16 · v12: манифест + iOS-меты + регистрация sw.js + промо-плашка установки (iPhone/Android). Стратегии кэша — в sw.js; live /mafgame/* кэш обходит -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1626">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MafgameStat">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<script>
/* SW только по http/https — локальный просмотр file:// не падает */
if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});
}
/* Промо-плашка «установите как приложение»: iPhone — инструкция Safari/«На экран Домой»,
   Android — кнопка установки (beforeinstallprompt) или инструкция про меню Chrome.
   Не показывается: внутри установленного приложения (standalone) и 14 дней после «Позже». */
(function(){try{
  if(!/^https?:$/.test(location.protocol))return;
  if((window.matchMedia&&matchMedia('(display-mode: standalone)').matches)||navigator.standalone)return;
  var KEY='mgs_pwa_promo_hide_until';
  try{if(Date.now()<(+localStorage.getItem(KEY)||0))return;}catch(e){}
  var deferred=null,shown=false;
  addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;
    var b=document.getElementById('mgsPwaGo');if(b){b.style.display='inline-block';}});
  function hide(days){try{localStorage.setItem(KEY,String(Date.now()+days*864e5));}catch(e){}
    var el=document.getElementById('mgsPwaPromo');if(el)el.parentNode.removeChild(el);}
  function show(){
    if(shown)return;shown=true;
    var ua=navigator.userAgent||'',isIOS=/iPhone|iPad|iPod/.test(ua),isAndroid=/Android/.test(ua);
    var how;
    if(isIOS){how='iPhone: откройте сайт в <b>Safari</b> → кнопка «Поделиться» <b>⬆</b> → <b>«На экран “Домой”»</b>.';}
    else if(isAndroid){how='Android: <b>Chrome</b> → меню <b>⋮</b> → <b>«Установить приложение»</b> (или «Добавить на гл. экран»).';}
    else{how='В Chrome/Edge: значок установки в адресной строке (справа).';}
    var tb=document.querySelector('.tabbar'),off='14px';
    try{if(tb&&getComputedStyle(tb).display!=='none')off='calc(14px + 66px)';}catch(e){}
    var d=document.createElement('div');d.id='mgsPwaPromo';
    d.innerHTML='<style>#mgsPwaPromo{position:fixed;left:12px;right:12px;bottom:'+off+';z-index:99990;max-width:520px;margin:0 auto;'+
      'background:linear-gradient(180deg,#12294a,#0f2138);border:1px solid rgba(212,175,55,.45);border-radius:14px;'+
      'box-shadow:0 14px 40px rgba(0,0,0,.55);padding:12px 14px;font-family:Manrope,-apple-system,system-ui,sans-serif;color:#eef3fb;}'+
      '#mgsPwaPromo .t{font-weight:800;font-size:13.5px;color:#f0d98a;margin:0 0 4px;}'+
      '#mgsPwaPromo .h{font-size:12px;line-height:1.45;color:#9fb2cc;}#mgsPwaPromo .h b{color:#eef3fb;}'+
      '#mgsPwaPromo .r{display:flex;gap:8px;margin-top:9px;align-items:center;}'+
      '#mgsPwaPromo button{font:inherit;font-size:12px;font-weight:800;border-radius:9px;padding:7px 13px;cursor:pointer;}'+
      '#mgsPwaGo{display:none;background:linear-gradient(100deg,#d4af37,#a5822b);border:0;color:#0a1626;}'+
      '#mgsPwaLater{background:transparent;border:1px solid rgba(212,175,55,.35);color:#9fb2cc;}</style>'+
      '<div class="t">📲 MafgameStat можно установить как приложение</div>'+
      '<div class="h">Иконка на экране, полноэкранный режим и быстрый доступ к live-статистике.<br>'+how+'</div>'+
      '<div class="r"><button id="mgsPwaGo">Установить</button><button id="mgsPwaLater">Позже</button></div>';
    document.body.appendChild(d);
    var go=document.getElementById('mgsPwaGo');
    if(deferred)go.style.display='inline-block';
    go.onclick=function(){if(!deferred)return;deferred.prompt();deferred.userChoice.then(function(){hide(365);});};
    document.getElementById('mgsPwaLater').onclick=function(){hide(14);};
  }
  if(document.readyState==='loading')addEventListener('DOMContentLoaded',function(){setTimeout(show,900);});
  else setTimeout(show,900);
}catch(e){}})();
</script>
</head>
<body>
<div class="wrap">
  <div class="topbar" id="nav"></div>
  <h1>Совместные посадки</h1>
  <div class="sub" id="sub">загрузка…</div>
  <div class="tabs" id="stage-tabs"></div>
  <div class="legend">
    <span>Сколько раз игроки сидели за одним столом:</span>
    <span><i style="background:#1a2e22"></i>реже</span>
    <span><i style="background:#ffd24a"></i>чаще</span>
    <span><i style="background:#0a0c18;border:1px solid #e8716b"></i><span style="color:#e8716b">0</span> — ни разу</span>
  </div>
  <div class="card" id="card"><div class="empty">загрузка…</div></div>
</div>
<script src="data/live.js"></script>
<script>
const T=new URLSearchParams(location.search).get('t')||'667';
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function renderNav(){
  document.getElementById('nav').innerHTML=
    `<a class="nav-btn muted" href="tournament.html?t=${T}">← Турнир</a>`+
    `<a class="nav-btn muted" href="standings.html?t=${T}">Сводная</a>`+
    `<a class="nav-btn muted" href="results.html?t=${T}">Игры</a>`+
    `<a class="nav-btn muted" href="player.html?t=${T}">Игроки</a>`;
}
function colorFor(v,max){
  if(v===0) return '#0a0c18';
  const t=max>0?v/max:0; // 0..1
  // muted green -> gold
  const a=[26,46,34], b=[255,210,74];
  const c=a.map((x,i)=>Math.round(x+(b[i]-x)*Math.pow(t,0.7)));
  return `rgb(${c[0]},${c[1]},${c[2]})`;
}
let GALL=null, mStage='qual';
function isFinal(g){return /финал/i.test(g.stage||'');}
function hasFinal(){return GALL&&GALL.games.some(isFinal);}
function gamesFor(){
  if(!GALL) return [];
  if(!hasFinal()) return GALL.games;
  return mStage==='all' ? GALL.games : GALL.games.filter(g=>!isFinal(g));
}
function renderStageTabs(){
  const el=document.getElementById('stage-tabs');
  if(!hasFinal()){el.innerHTML='';return;}
  el.innerHTML=[['qual','Только квалификация'],['all','С финалом']].map(([k,l])=>`<button class="tab${k===mStage?' active':''}" data-k="${k}">${l}</button>`).join('');
  el.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{mStage=b.dataset.k;renderStageTabs();draw();});
}
function draw(){
  const card=document.getElementById('card');
  const games=gamesFor();
  const set=new Set();
  games.forEach(g=>(g.tables||[]).forEach(t=>(t.seats||[]).forEach(s=>set.add(s.name))));
  const players=[...set].sort((a,b)=>a.localeCompare(b,'ru'));
  const idx={};players.forEach((p,i)=>idx[p]=i);
  const n=players.length;
  const M=Array.from({length:n},()=>new Array(n).fill(0));
  games.forEach(g=>(g.tables||[]).forEach(t=>{
    const names=(t.seats||[]).map(s=>s.name);
    for(let i=0;i<names.length;i++)for(let j=i+1;j<names.length;j++){const a=idx[names[i]],b=idx[names[j]];if(a==null||b==null)continue;M[a][b]++;M[b][a]++;}
  }));
  let max=0;M.forEach(r=>r.forEach(v=>{if(v>max)max=v;}));
  const scope=hasFinal()?(mStage==='all'?'с финалом':'только квалификация'):'';
  document.getElementById('sub').innerHTML=`Турнир ${T} · ${games.length} игр${scope?' ('+scope+')':''} · ${n} игроков · максимум совместных посадок: <b style="color:#ffd24a">${max}</b>`;
  let h='<table><thead><tr><th class="corner"></th>';
  players.forEach(p=>h+=`<th><span class="vname">${esc(p.length>12?p.slice(0,11)+'…':p)}</span></th>`);
  h+='</tr></thead><tbody>';
  players.forEach((p,i)=>{
    h+=`<tr><th><a class="pn" href="player.html?nick=${encodeURIComponent(p)}&t=${T}">${esc(p)}</a></th>`;
    players.forEach((q,j)=>{
      if(i===j){h+='<td class="diag">—</td>';return;}
      const v=M[i][j];
      h+=`<td class="${v===0?'zero':''}" style="background:${colorFor(v,max)}" title="${esc(p)} · ${esc(q)}: ${v}">${v}</td>`;
    });
    h+='</tr>';
  });
  h+='</tbody></table>';
  card.innerHTML=h;
}
renderNav();
if(window.applyAccent)applyAccent(T);
window.loadGames(T).then(G=>{
  if(!G||!G.games||!G.games.length){document.getElementById('sub').textContent='Нет данных рассадки для турнира '+T;document.getElementById('card').innerHTML='<div class="empty">Рассадка появится позже.</div>';return;}
  GALL=G; renderStageTabs(); draw();
}).catch(e=>{document.getElementById('sub').textContent='Ошибка: '+e.message;});
</script>
</body>
</html>
