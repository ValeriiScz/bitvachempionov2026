<!DOCTYPE html>
<html lang="ru">
<head>
<!-- MafgameStat · teams693.html · v1.0 · 2026-06-19 · карточки команд парного турнира 693 (Protocol 4), protocol-стиль -->
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Команды — MafiaCl Protocol 4</title>
<style>
  *{box-sizing:border-box;}
  html,body{max-width:100%;}
  body{margin:0;background:radial-gradient(circle at 50% -10%,#2a0d0d 0%,#120708 55%,#0a0608 100%) fixed;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;min-height:100vh;padding:24px 16px 60px;}
  .wrap{max-width:1100px;margin:0 auto;}
  .topbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
  .nav-btn{padding:9px 16px;background:rgba(226,58,58,.12);border:1px solid #e23a3a;color:#ff8a8a;border-radius:8px;font-size:13px;font-weight:700;text-decoration:none;}
  .nav-btn.muted{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.12);color:#dfe2f0;}
  .nav-btn.muted:hover{background:rgba(255,255,255,.1);color:#fff;}
  h1{font-size:25px;margin:6px 0 2px;letter-spacing:.5px;}
  h1 .acc{color:#e23a3a;}
  .sub{color:#a0a4b8;font-size:13px;margin-bottom:18px;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
  .team{background:linear-gradient(160deg,rgba(226,58,58,.12),rgba(20,8,9,.9));border:1px solid rgba(226,58,58,.35);border-radius:16px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.5);}
  .team .hdr{display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(226,58,58,.25);background:rgba(226,58,58,.1);}
  .team .num{flex:none;width:34px;height:34px;border-radius:8px;background:#e23a3a;color:#fff;font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center;}
  .team .tname{font-size:17px;font-weight:800;letter-spacing:.3px;}
  .members{display:flex;gap:10px;padding:16px;}
  .mem{flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;text-align:center;}
  .av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#3a1a1a,#2a0d0d);border:2px solid rgba(226,58,58,.5);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#ff8a8a;overflow:hidden;}
  .av img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
  .mn{font-size:14px;font-weight:700;color:#fff;}
  .mn a{color:inherit;text-decoration:none;}
  .mn a:hover{color:#ff8a8a;}
  .judges{margin-top:22px;color:#a0a4b8;font-size:13px;display:flex;gap:18px;flex-wrap:wrap;align-items:center;}
  .judges b{color:#ff8a8a;}
  .empty{padding:40px;text-align:center;color:#a0a4b8;}
</style>
<!-- PWA · 2026-07-16 · v12: манифест + iOS-меты + регистрация sw.js + промо-плашка установки (iPhone/Android). Стратегии кэша — в sw.js; live /mafgame/* кэш обходит -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a1626">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="MafgameStat">
<link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
<script>
/* SW только по http/https — локальный просмотр file:// не падает */
if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){
  addEventListener('load',function(){navigator.serviceWorker.register('sw.js').catch(function(){})});
}
/* Промо-плашка «установите как приложение»: iPhone — инструкция Safari/«На экран Домой»,
   Android — кнопка установки (beforeinstallprompt) или инструкция про меню Chrome.
   Не показывается: внутри установленного приложения (standalone) и 14 дней после «Позже». */
(function(){try{
  if(!/^https?:$/.test(location.protocol))return;
  if((window.matchMedia&&matchMedia('(display-mode: standalone)').matches)||navigator.standalone)return;
  var KEY='mgs_pwa_promo_hide_until';
  try{if(Date.now()<(+localStorage.getItem(KEY)||0))return;}catch(e){}
  var deferred=null,shown=false;
  addEventListener('beforeinstallprompt',function(e){e.preventDefault();deferred=e;
    var b=document.getElementById('mgsPwaGo');if(b){b.style.display='inline-block';}});
  function hide(days){try{localStorage.setItem(KEY,String(Date.now()+days*864e5));}catch(e){}
    var el=document.getElementById('mgsPwaPromo');if(el)el.parentNode.removeChild(el);}
  function show(){
    if(shown)return;shown=true;
    var ua=navigator.userAgent||'',isIOS=/iPhone|iPad|iPod/.test(ua),isAndroid=/Android/.test(ua);
    var how;
    if(isIOS){how='iPhone: откройте сайт в <b>Safari</b> → кнопка «Поделиться» <b>⬆</b> → <b>«На экран “Домой”»</b>.';}
    else if(isAndroid){how='Android: <b>Chrome</b> → меню <b>⋮</b> → <b>«Установить приложение»</b> (или «Добавить на гл. экран»).';}
    else{how='В Chrome/Edge: значок установки в адресной строке (справа).';}
    var tb=document.querySelector('.tabbar'),off='14px';
    try{if(tb&&getComputedStyle(tb).display!=='none')off='calc(14px + 66px)';}catch(e){}
    var d=document.createElement('div');d.id='mgsPwaPromo';
    d.innerHTML='<style>#mgsPwaPromo{position:fixed;left:12px;right:12px;bottom:'+off+';z-index:99990;max-width:520px;margin:0 auto;'+
      'background:linear-gradient(180deg,#12294a,#0f2138);border:1px solid rgba(212,175,55,.45);border-radius:14px;'+
      'box-shadow:0 14px 40px rgba(0,0,0,.55);padding:12px 14px;font-family:Manrope,-apple-system,system-ui,sans-serif;color:#eef3fb;}'+
      '#mgsPwaPromo .t{font-weight:800;font-size:13.5px;color:#f0d98a;margin:0 0 4px;}'+
      '#mgsPwaPromo .h{font-size:12px;line-height:1.45;color:#9fb2cc;}#mgsPwaPromo .h b{color:#eef3fb;}'+
      '#mgsPwaPromo .r{display:flex;gap:8px;margin-top:9px;align-items:center;}'+
      '#mgsPwaPromo button{font:inherit;font-size:12px;font-weight:800;border-radius:9px;padding:7px 13px;cursor:pointer;}'+
      '#mgsPwaGo{display:none;background:linear-gradient(100deg,#d4af37,#a5822b);border:0;color:#0a1626;}'+
      '#mgsPwaLater{background:transparent;border:1px solid rgba(212,175,55,.35);color:#9fb2cc;}</style>'+
      '<div class="t">📲 MafgameStat можно установить как приложение</div>'+
      '<div class="h">Иконка на экране, полноэкранный режим и быстрый доступ к live-статистике.<br>'+how+'</div>'+
      '<div class="r"><button id="mgsPwaGo">Установить</button><button id="mgsPwaLater">Позже</button></div>';
    document.body.appendChild(d);
    var go=document.getElementById('mgsPwaGo');
    if(deferred)go.style.display='inline-block';
    go.onclick=function(){if(!deferred)return;deferred.prompt();deferred.userChoice.then(function(){hide(365);});};
    document.getElementById('mgsPwaLater').onclick=function(){hide(14);};
  }
  if(document.readyState==='loading')addEventListener('DOMContentLoaded',function(){setTimeout(show,900);});
  else setTimeout(show,900);
}catch(e){}})();
</script>
</head>
<body>
<div class="wrap">
  <div class="topbar" id="nav"></div>
  <h1>Команды <span class="acc">· Protocol 4</span></h1>
  <div class="sub" id="sub">загрузка…</div>
  <div class="grid" id="grid"><div class="empty">загрузка…</div></div>
  <div class="judges" id="judges"></div>
</div>
<script>
const T='693';
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
document.getElementById('nav').innerHTML=
  `<a class="nav-btn muted" href="tournament.html?t=${T}">← Турнир</a>`+
  `<a class="nav-btn muted" href="results.html?t=${T}">Рассадка</a>`+
  `<a class="nav-btn muted" href="markers.html?t=${T}">Совместные посадки</a>`+
  `<a class="nav-btn muted" href="standings.html?t=${T}">Сводная</a>`;
Promise.all([
  fetch('data/tournament_693.json').then(r=>r.json()),
  fetch('data/avatars_693.json').then(r=>r.ok?r.json():{avatars:{}}).catch(()=>({avatars:{}}))
]).then(([D,A])=>{
  const av=A.avatars||{};
  const teams=D.teams||[];
  document.getElementById('sub').textContent=`${D.tournament_name} · ${teams.length} команд по 2 · ${esc(D.format||'')}`;
  const avHtml=(nick)=>av[nick]?`<img src="${av[nick]}" referrerpolicy="no-referrer" onerror="this.style.display='none'">`:(nick[0]||'?').toUpperCase();
  document.getElementById('grid').innerHTML=teams.map((t,i)=>`
    <div class="team">
      <div class="hdr"><span class="num">${i+1}</span><span class="tname">${esc(t.team)}</span></div>
      <div class="members">${(t.members||[]).map(m=>`
        <div class="mem"><span class="av">${avHtml(m)}</span><span class="mn"><a href="player.html?nick=${encodeURIComponent(m)}&t=${T}">${esc(m)}</a></span></div>`).join('')}</div>
    </div>`).join('');
  const jb=D.judges_by_table||{};
  document.getElementById('judges').innerHTML=Object.keys(jb).length?`Судьи: ${Object.entries(jb).map(([tbl,j])=>`стол ${tbl==='1'?'I':tbl==='2'?'II':tbl} — <b>${esc(j)}</b>`).join(' · ')}`:'';
}).catch(e=>{document.getElementById('sub').textContent='Ошибка: '+e.message;document.getElementById('grid').innerHTML='';});
</script>
</body>
</html>
