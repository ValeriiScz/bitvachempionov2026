   КЛЮЧЕВЫЕ ГЛОБАЛЫ:
   - D — все данные. D.RATE[nick]={tier,elo,...}. D.gplist — сыгранные игры.
   - NAV — 4 группы (Обзор / Моё / Игроки[состав·кто-с-кем·по-играм] / Результаты[таблица·игры·по-картам·судьи]) → sidebar (desktop) + tabbar (mobile).

   - statFull — тумблер Компактно/Подробно (скрывает/показывает .x-колонки в таблицах).
   - myPlayer / viewMode — «мой игрок» и «с первой/с текущей игры», хранятся в localStorage.
   - stStage/stGame/stMode — состояние Сводной; rTab — вкладка Ролей; gmRound — выбранная игра в «Играх».

   ФОРМУЛЫ: Σ = WPTS + доп(aps) + Ci. Роли: Citizen/Sheriff/Mafia/Don.

   ВАЖНЫЕ РЕШЕНИЯ / ГРАБЛИ (детали в методичке):
   - Адаптив: breakpoint 1024px (ловит и раскрытый Fold). Мобилка ≠ ужатый десктоп: tabbar снизу, карточки/скролл-таблицы.

function computeSeating(){
  D.occ={};D.opp={};D.seatByGame={};D.played=0;
  D.games.forEach((g,gi)=>{const gnum=gi+1;D.seatByGame[gnum]={};let done=g.tables.length>0;

        names.forEach(m=>{if(m!==n){(D.opp[n]=D.opp[n]||{})[m]=(D.opp[n][m]||0)+1;}});});});
    if(done)D.played=gnum;});
  D.INFO={};D.RATE={};

function aggregateN(list){
  const P={};let red=0,black=0,tables=0,apsSum=0;const rr=()=>({sigma:0,g:0,w:0,wpts:0,aps:0,ci:0,apsW:0,apsL:0,wg:0,lg:0,apsPos:0,apsNeg:0});
  const get=n=>P[n]||(P[n]={name:n,wpts:0,aps:0,ci:0,g:0,w:0,k:0,apsW:0,apsL:0,wg:0,lg:0,apsPos:0,apsNeg:0,roles:{Citizen:rr(),Sheriff:rr(),Mafia:rr(),Don:rr()}});
  list.forEach(g=>g.tables.forEach(t=>{if(t.winner==='unknown')return;tables++;if(t.winner==='red_win')red++;else if(t.winner==='black_win')black++;
    t.seats.forEach(s=>{if(!s.name)return;const p=get(s.name);const sig=(s.wpts||0)+(s.aps||0)+(s.ci||0);const ap=s.aps||0;const W=s.result==='W';
      p.wpts+=s.wpts||0;p.aps+=ap;p.ci+=s.ci||0;p.g++;if(W){p.w++;p.apsW+=ap;p.wg++;}else{p.apsL+=ap;p.lg++;}if(ap>0)p.apsPos+=ap;else if(ap<0)p.apsNeg+=ap;if(s.marker==='first_killed')p.k++;apsSum+=ap;
      if(s.role&&p.roles[s.role]){const r=p.roles[s.role];r.sigma+=sig;r.g++;r.wpts+=s.wpts||0;r.aps+=ap;r.ci+=s.ci||0;if(W){r.w++;r.apsW+=ap;r.wg++;}else{r.apsL+=ap;r.lg++;}if(ap>0)r.apsPos+=ap;else if(ap<0)r.apsNeg+=ap;}});}));
  const rows=Object.values(P).map(p=>({...p,sigma:+(p.wpts+p.aps+p.ci).toFixed(2)}));
  rows.sort((a,b)=>b.sigma-a.sigma||b.aps-a.aps||a.name.localeCompare(b.name,'ru'));rows.forEach((r,i)=>r.place=i+1);
  return {rows,red,black,tables,apsSum};
}
function makeDemo(){

  function playTable(names,tn){const n=names.length;const roles=shuf(['Don','Mafia','Mafia','Sheriff'].concat(Array(Math.max(0,n-4)).fill('Citizen')));
    const winner=Math.random()<0.5?'red_win':'black_win';const fk=Math.floor(Math.random()*n);
    const seats=names.map((nm,i)=>{const role=roles[i]||'Citizen';const isRed=(role==='Citizen'||role==='Sheriff');const win=((winner==='red_win')===isRed);
      return {seat:i+1,name:nm,role,result:win?'W':'L',wpts:win?+rnd(0.7,1).toFixed(2):0,aps:+rnd(-0.2,0.6).toFixed(2),ci:+rnd(0,0.3).toFixed(2),marker:i===fk?'first_killed':null};});

  return quals.concat(semis,finals);
}

     <button class="btn ghost" style="margin-left:auto" data-p="${esc(nick)}" onclick="goPlayer(this.dataset.p)">страница игрока →</button></div>
   ${myx}
   ${Object.keys(byC).map(Number).sort((a,b)=>b-a).map(c=>`<div class="panel"><h3>${c===1?'Одна игра вместе':'×'+c+' — '+c+' '+plW(c,'игра','игры','игр')+' вместе'} (${byC[c].length})</h3><div class="oppcards">${byC[c].map(cardO).join('')}</div></div>`).join('')}
   <div class="panel"><h3>Ни разу за столом (${never.length})</h3><div class="zero">${never.length?never.map(esc).join(', '):'пересекается со всеми'}</div></div>`;
}
/* «Судьи» — допы по столам (квалификация). v13.4: сводная внизу (компакт/подробно), модель девиаций, штрафы детально, авто-выводы */
let jdFull=(function(){try{return localStorage.getItem('ce634_jdfull')==='1'}catch(e){return false}})();
let jdConcl=false;
function setJdFull(v){jdFull=!!v;try{localStorage.setItem('ce634_jdfull',v?'1':'0');}catch(e){}paintJudges();}
function toggleJdConcl(){jdConcl=!jdConcl;paintJudges();}
/* Пороги девиаций от медианы (ОЦЕНКА, калибруем по ходу ЧЕ): допы/игру ±0.25/±0.4 (канон судейского отчёта), доли ±12/±25 пп, ср. размеры ±0.07/±0.15, штрафов/игру ±0.3/±0.6, роли ±0.12/±0.25 */
const JD_T={dpg:[0.25,0.4],pct:[12,25],avg:[0.07,0.15],npg:[0.3,0.6],role:[0.12,0.25]};
function jdMed(a){const q=a.slice().sort((x,y)=>x-y);return q.length?q[Math.floor(q.length/2)]:0;}
function jdGrade(v,m,t){const d=Math.abs(v-m);return d<=t[0]?'':(d<=t[1]?'warn':'bad');}
function paintJudges(){
  const area=document.getElementById('jdArea');if(!area)return;
  const quals=(D.gplist||[]).filter(g=>(g.stage||'Квалификация')==='Квалификация');
  const tabs={};
  quals.forEach(g=>g.tables.forEach(t=>{const T=tabs[t.table_num]=tabs[t.table_num]||{games:0,seats:0,pos:0,posSum:0,neg:0,negSum:0,w:[0,0,0],l:[0,0,0],roles:{Citizen:[0,0],Sheriff:[0,0],Mafia:[0,0],Don:[0,0]}};
    T.games++;t.seats.forEach(st=>{if(!st.name)return;const a=st.aps||0;T.seats++;
      if(a>0){T.pos++;T.posSum+=a;}if(a<0){T.neg++;T.negSum+=a;}
      const b=(st.result==='W')?T.w:T.l;b[0]++;if(a>0){b[1]++;b[2]+=a;}
      if(st.role&&T.roles[st.role]){T.roles[st.role][0]++;if(a>0)T.roles[st.role][1]+=a;}});}));
  const keys=Object.keys(tabs).map(Number).sort((a,b)=>a-b);
  if(!keys.length){area.innerHTML=`<div class="panel"><div class="stub"><div class="si">&#9878;</div><h3>Пока нечего измерять</h3><p>Цифры появятся после первых сыгранных игр. Судьи столов: ${Object.keys(D.judges).sort().map(k=>'стол '+(ROMAN[k]||k)+' — '+esc((D.judges[k]||{}).name||'?')).join(' · ')||'—'}.</p><p>До старта можно посмотреть на демо-данных: «Обзор» → Демо.</p></div></div>`;return;}
  const per=keys.map(t=>{const T=tabs[t];return {t,T,
    dpg:T.games?T.posSum/T.games:0,
    cov:T.seats?T.pos/T.seats*100:0,
    shw:T.w[0]?T.w[1]/T.w[0]*100:0, shl:T.l[0]?T.l[1]/T.l[0]*100:0,
    avw:T.w[1]?T.w[2]/T.w[1]:null, avl:T.l[1]?T.l[2]/T.l[1]:null,
    npg:T.games?T.neg/T.games:0, avn:T.neg?T.negSum/T.neg:null};});
  const M={dpg:jdMed(per.map(x=>x.dpg)),cov:jdMed(per.map(x=>x.cov)),shw:jdMed(per.map(x=>x.shw)),shl:jdMed(per.map(x=>x.shl)),
    avw:jdMed(per.filter(x=>x.avw!=null).map(x=>x.avw)),avl:jdMed(per.filter(x=>x.avl!=null).map(x=>x.avl)),npg:jdMed(per.map(x=>x.npg))};
  const med=M.dpg;
  const MR={};['Citizen','Sheriff','Mafia','Don'].forEach(k=>{MR[k]=jdMed(per.filter(x=>x.T.roles[k][0]>0).map(x=>x.T.roles[k][1]/x.T.roles[k][0]));});
  const nameOf=x=>{const jj=D.judges[x.t];return 'стол '+(ROMAN[x.t]||x.t)+(jj?' ('+esc(jj.name)+')':'');};
  /* карточки (сверху) */
  const cards=per.map(x=>{const T=x.T,jj=D.judges[x.t];
    const dev=x.dpg-med;const g=jdGrade(x.dpg,med,JD_T.dpg);const cls=g||'ok';
    const light=cls==='ok'?'в норме':(cls==='warn'?'на грани':(dev>0?'шире всех':'уже всех'));
    const roleRow=['Citizen','Sheriff','Mafia','Don'].map(k=>{const r=T.roles[k];const rv=r[0]?r[1]/r[0]:null;const rc=rv!=null?jdGrade(rv,MR[k],JD_T.role):'';return `<div class="rcell${rc?' jd-'+rc:''}"><div class="rk">${RSHORT[k]}</div><div class="rv${r[0]?'':' na'}">${r[0]?fmt(rv):'—'}</div></div>`;}).join('');
    return `<div class="panel jcard j-${cls}"><div class="jhead">${jj&&jj.avatar?`<img src="${esc(jj.avatar)}" referrerpolicy="no-referrer" onerror="this.style.display='none'">`:''}<div><div class="jn">Стол ${ROMAN[x.t]||x.t}${jj?` · <b>${esc(jj.name)}</b>`:''}</div><div class="jt">${T.games} игр · штрафов ${T.neg}${T.neg?` (Σ ${fmt(T.negSum)}, ср. ${fmt(x.avn)})`:''}</div></div><span class="jlight ${cls}">${light}</span></div>
      <div class="jbig">${fmt(x.dpg)}<small> плюсовых допов за игру</small></div>
      <div class="jrow">плюс получают <b>${Math.round(x.cov)}%</b> игроков: победители <b class="win">${Math.round(x.shw)}%</b> · проигравшие <b class="los">${Math.round(x.shl)}%</b></div>
      <div class="jrow">средний плюс (когда ставит): победителю <b class="win">${x.avw!=null?fmt(x.avw):'—'}</b> · проигравшему <b class="los">${x.avl!=null?fmt(x.avl):'—'}</b></div>
      <div class="rk" style="margin:10px 0 4px">Средний плюс по ролям (на игрока-игру)</div><div class="rate">${roleRow}</div></div>`;
  }).join('');
  /* сводная (внизу): компактно/подробно, подсветка девиаций */
  const cell=(val,cls,extra)=>`<td class="${extra||''}${cls?' jd-'+cls:''}">${val}</td>`;
  const rows=per.map(x=>{const jj=D.judges[x.t];const dev=x.dpg-med;const cD=jdGrade(x.dpg,med,JD_T.dpg);
    const base=`<tr><td class="l" style="white-space:nowrap">${ROMAN[x.t]||x.t} · <b>${jj?esc(jj.name):'—'}</b></td><td>${x.T.games}</td>`+
      cell(fmt(x.dpg),cD,'sig')+`<td><span class="dlt ${cD||'ok'}">${dev>0?'+':''}${fmt(dev)}</span></td>`;
    const pen=cell(x.T.neg,jdGrade(x.npg,M.npg,JD_T.npg),'grp');
    if(!jdFull)return base+pen+'</tr>';
    return base+
      cell(Math.round(x.cov)+'%',jdGrade(x.cov,M.cov,JD_T.pct),'grp')+
      cell('<span class="win">'+Math.round(x.shw)+'%</span>',jdGrade(x.shw,M.shw,JD_T.pct))+
      cell('<span class="los">'+Math.round(x.shl)+'%</span>',jdGrade(x.shl,M.shl,JD_T.pct))+
      cell(x.avw!=null?fmt(x.avw):'—',x.avw!=null?jdGrade(x.avw,M.avw,JD_T.avg):'','grp')+
      cell(x.avl!=null?fmt(x.avl):'—',x.avl!=null?jdGrade(x.avl,M.avl,JD_T.avg):'')+
      pen+cell(x.T.neg?fmt(x.T.negSum):'—','')+cell(x.avn!=null?fmt(x.avn):'—','')+'</tr>';}).join('');
  const head=jdFull
    ?`<tr><th class="l">Стол · судья</th><th>Игр</th><th class="sig" title="плюсовых допов за игру">Доп/игру</th><th title="отклонение от медианы столов">Δ мед</th><th class="grp" title="доля игроков с плюсом">Допы %</th><th title="доля победителей с плюсом">%W+</th><th title="доля проигравших с плюсом">%L+</th><th class="grp" title="средний размер плюса победителю (когда ставит)">ср.+W</th><th title="средний размер плюса проигравшему (когда ставит)">ср.+L</th><th class="grp" title="штрафных допов (количество)">Штраф</th><th title="сумма штрафов">Σ штр</th><th title="средний размер штрафа">ср. штр</th></tr>`
    :`<tr><th class="l">Стол · судья</th><th>Игр</th><th class="sig" title="плюсовых допов за игру">Доп/игру</th><th title="отклонение от медианы столов">Δ мед</th><th class="grp" title="штрафных допов (количество)">Штраф</th></tr>`;
  const sumTbl=`<div class="panel" style="margin-top:12px"><div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap"><h3 style="margin:0">Сводная по судьям</h3><span class="seg" style="margin-left:auto"><button class="${jdFull?'':'on'}" onclick="setJdFull(false)">компактно</button><button class="${jdFull?'on':''}" onclick="setJdFull(true)">подробно</button></span></div>
   <div style="overflow:auto;margin:0 -4px"><table class="tbl jsumt" style="font-size:12px"><thead>${head}</thead><tbody>${rows}</tbody></table></div>
   <div class="note" style="margin-top:8px">Подсветка ячейки — отклонение от медианы столов: жёлтая «на грани», красная «выбивается». Пороги — оценка, калибруем по ходу: допы ±0.25/±0.4, доли ±12/±25 пп, средние ±0.07/±0.15, штрафов/игру ±0.3/±0.6.</div></div>`;
  /* авто-выводы (скрываемые) */
  const out=[];
  const offD=per.filter(x=>jdGrade(x.dpg,med,JD_T.dpg));
  out.push('<b>1. Средний плюс между столами.</b> Медиана — '+fmt(med)+' за игру. '+(offD.length?offD.map(x=>nameOf(x)+' — '+fmt(x.dpg)+' ('+(x.dpg>med?'+':'')+fmt(x.dpg-med)+', '+(x.dpg>med?'шире':'уже')+' медианы)').join('; ')+'. Остальные в норме.':'Все столы в пределах обычного разброса (±0.25) — ок.'));
  const offC=per.filter(x=>jdGrade(x.cov,M.cov,JD_T.pct));
  out.push('<b>2. Сколько игроков получают допы.</b> Медиана — '+Math.round(M.cov)+'% игроков за игру. '+(offC.length?offC.map(x=>nameOf(x)+' — '+Math.round(x.cov)+'%'+(x.cov>M.cov?' (раздаёт шире)':' (жаднее)')).join('; ')+'.':'Разброс небольшой — ок.'));
  const offL=per.filter(x=>jdGrade(x.shl,M.shl,JD_T.pct)||(x.avl!=null&&jdGrade(x.avl,M.avl,JD_T.avg)));
  out.push('<b>3. Допы проигравшим</b> (историческая точка расхождения судей). Медиана: плюс у '+Math.round(M.shl)+'% проигравших, средний размер '+(M.avl?fmt(M.avl):'—')+'. '+(offL.length?offL.map(x=>nameOf(x)+' — '+Math.round(x.shl)+'%'+(x.avl!=null?' по '+fmt(x.avl):'')).join('; ')+' — следим.':'Столы судят проигравших похоже — ок.'));
  const offR=[];['Citizen','Sheriff','Mafia','Don'].forEach(k=>{per.forEach(x=>{const r=x.T.roles[k];if(!r[0])return;const v=r[1]/r[0];if(jdGrade(v,MR[k],JD_T.role))offR.push(nameOf(x)+': '+RLONG[k].toLowerCase()+' '+fmt(v)+' против медианы '+fmt(MR[k]));});});
  out.push('<b>4. По картам.</b> '+(offR.length?offR.join('; ')+'.':'Заметных перекосов по ролям нет — ок.'));
  const offN=per.filter(x=>jdGrade(x.npg,M.npg,JD_T.npg));
  const totN=per.reduce((a,x)=>a+x.T.neg,0),totNS=per.reduce((a,x)=>a+x.T.negSum,0);
  out.push('<b>5. Штрафы.</b> Всего '+totN+(totN?' (Σ '+fmt(totNS)+', ср. '+fmt(totN?totNS/totN:0)+')':'')+'. '+(offN.length?offN.map(x=>nameOf(x)+' — '+fmt(x.npg)+' за игру'+(x.avn!=null?' (ср. '+fmt(x.avn)+')':'')).join('; ')+' — чаще остальных.':'Частота по столам сопоставима; размеры штрафов в федерации стандартизированы.'));
  const conclBlock=`<div style="margin-top:12px"><button class="btn ghost" onclick="toggleJdConcl()">${jdConcl?'скрыть выводы &#9650;':'выводы по судьям &#9660;'}</button></div>`+
    (jdConcl?`<div class="panel" style="margin-top:10px"><h3>Выводы — автоматические, черновые</h3>${out.map(o=>`<div class="jrow" style="margin:0 0 8px">${o}</div>`).join('')}<div class="note" style="margin-top:6px">Считается на лету из сыгранных игр по порогам сводной. Пока игр мало, «выбивается» может быть просто случайностью — оргвыводы не отсюда, отсюда — куда смотреть.</div></div>`:'');
  const few=per.some(x=>x.T.games<4);
  area.innerHTML=`<div class="note" style="margin:0 0 10px">Судьи закреплены за столами, поэтому стол = почерк судьи. Считаем по квалификации: финал не сравниваем — там один стол и другой коэффициент допов. «В норме» — в пределах ±0.25 от медианы: такую разницу даёт обычная случайность.</div>
   ${few?'<div class="note" style="margin:0 0 10px">&#9203; Игр пока мало — цифры устаканятся к концу дня, раньше времени выводов не делаем.</div>':''}
   <div class="jcards">${cards}</div>
   ${sumTbl}
   ${conclBlock}
   <div class="note" style="margin-top:10px">Зачем это: штрафы в федерации стандартизированы, а плюсовые допы судьи ставят в разной манере. Если один стол системно шире или уже других — таблица начинает зависеть от того, за какой стол игрока посадило расписание. Эта страница делает почерк судей видимым — и для главного судьи, и для игроков.</div>`;
}
function stub(id){const s=SECTIONS.find(x=>x.id===id)||{};
  return `<div class="view"><div class="secttl">${s.ic||'◆'} ${esc(s.lab||'')}</div><div class="panel"><div class="stub"><div class="si">${s.ic||'◆'}</div><h3>Откроется после старта</h3>
    <p>Игры, роли и статистика игрока появятся здесь автоматически после первой сыгранной игры (18 июля). До старта доступны рассадка, карточки и составы.</p></div></div></div>`;}
</script>
</body>
</html>
