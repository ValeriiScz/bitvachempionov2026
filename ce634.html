<style>
  :root{--gold:#d4af37;--gold-hi:#f0d98a;--gold-dk:#a5822b;--ink:#eef3fb;--mut:#9fb2cc;--dim:#6d84a3;
    --bg:#080f1c;--panel:#0f2138;--panel2:#12294a;--line:rgba(212,175,55,.24);--line2:rgba(212,175,55,.14);--nav-w:246px;}
  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{margin:0;font-family:'Manrope',-apple-system,system-ui,sans-serif;color:var(--ink);min-height:100vh;
    background:radial-gradient(1200px 560px at 78% -12%,rgba(212,175,55,.14),transparent 60%),linear-gradient(180deg,#0b1a2e 0%,#0a1626 50%,#060d18 100%) fixed;}
  a{color:inherit;}
  .shell{display:flex;min-height:100vh;}
  .side{width:var(--nav-w);flex:none;position:sticky;top:0;align-self:flex-start;height:100vh;

  .brand{display:flex;gap:11px;align-items:center;padding:6px 8px 12px;border-bottom:1px solid var(--line2);margin-bottom:6px;}
  .brand .cr{font-size:22px;color:var(--gold);line-height:1;text-shadow:0 0 12px rgba(212,175,55,.5);}
  .brand .bt{font-family:'Cinzel',serif;font-weight:800;font-size:15px;color:var(--gold-hi);line-height:1.1;letter-spacing:.4px;}
  .brand .bs{font-size:10.5px;color:var(--mut);margin-top:2px;letter-spacing:.3px;}
  .navgrp{font-size:10px;font-weight:800;letter-spacing:1.1px;text-transform:uppercase;color:var(--gold);opacity:.85;padding:14px 12px 5px;display:flex;align-items:center;gap:7px;}
  .navgrp .gi{font-size:12px;opacity:.9;}
  .navbtn{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:9px 12px 9px 16px;border-radius:10px;
    background:transparent;border:1px solid transparent;color:var(--ink);font-size:13px;font-weight:700;cursor:pointer;transition:background .12s,border-color .12s;}
  .navbtn .ic{width:20px;text-align:center;font-size:14px;color:var(--gold);flex:none;}
  .navbtn .lb{flex:1;}
  .navbtn .tag{font-size:9px;font-weight:800;letter-spacing:.4px;color:var(--dim);text-transform:uppercase;}
  .navbtn:hover{background:rgba(212,175,55,.08);border-color:var(--line2);}
  .navbtn.active{background:linear-gradient(100deg,rgba(212,175,55,.20),rgba(212,175,55,.06));border-color:var(--line);color:var(--gold-hi);}
  .navbtn.active .ic{color:var(--gold-hi);}
  .navbtn.locked{opacity:.45;cursor:default;}
  .navbtn.locked:hover{background:transparent;border-color:transparent;}
  .side .toclassic{margin-top:auto;font-size:11.5px;color:var(--mut);text-decoration:none;padding:14px 10px 4px;border-top:1px solid var(--line2);}
  .side .toclassic:hover{color:var(--gold-hi);}
  .main{flex:1;min-width:0;padding:16px 20px 60px;}
  .topband{display:flex;gap:16px;align-items:stretch;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:18px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.5);margin-bottom:18px;}
  .topband .poster{flex:none;width:280px;background:#060d18;}
  .topband .poster img{width:100%;height:100%;object-fit:cover;display:block;aspect-ratio:16/9;}
  .topband .info{flex:1;min-width:0;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;}
  .topband h1{font-family:'Cinzel',serif;font-weight:800;font-size:23px;color:var(--gold-hi);margin:0 0 3px;letter-spacing:.5px;}
  .topband .meta{font-size:12.5px;color:var(--mut);}
  .chips{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px;}
  .chip{font-size:11.5px;font-weight:700;color:var(--ink);background:rgba(212,175,55,.10);border:1px solid var(--line);border-radius:9px;padding:5px 10px;}
  .chip b{color:var(--gold-hi);}

  .cdown{display:flex;gap:8px;margin-top:12px;}

  .cdown .cu .n{font-family:'Cinzel',serif;font-size:20px;font-weight:800;color:var(--gold-hi);line-height:1;}
  .cdown .cu .l{font-size:9px;letter-spacing:.5px;text-transform:uppercase;color:var(--dim);margin-top:3px;}
  .view{animation:fade .18s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
  .secttl{font-family:'Cinzel',serif;font-size:17px;font-weight:800;color:var(--gold-hi);margin:2px 0 12px;display:flex;align-items:center;gap:9px;letter-spacing:.4px;}

  .stat .k{font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--dim);font-weight:800;}
  .stat .v{font-family:'Cinzel',serif;font-size:24px;font-weight:800;color:var(--gold-hi);margin-top:5px;line-height:1;}

  .judge .jn b{color:var(--gold-hi);}

  .tf{cursor:pointer;font-size:12.5px;font-weight:800;border-radius:9px;padding:5px 11px;border:1px solid var(--line2);background:rgba(255,255,255,.03);color:var(--mut);display:inline-flex;align-items:center;gap:6px;}
  .tf small{font-weight:700;opacity:.85;}
  .tf.on{border-color:var(--gold);color:var(--gold-hi);background:rgba(212,175,55,.12);}
  .tpill{display:inline-block;min-width:20px;text-align:center;padding:1px 8px;border-radius:6px;font-weight:800;font-size:12.5px;}
  .tp-S{background:linear-gradient(135deg,var(--gold-hi),var(--gold));color:#0a1626;}
  .tp-A{background:rgba(103,224,143,.16);color:#7ce6a0;border:1px solid rgba(103,224,143,.4);}
  .tp-B{background:rgba(122,167,214,.18);color:#9cc0e6;border:1px solid rgba(122,167,214,.45);}
  .tp-C{background:rgba(212,175,55,.14);color:var(--gold-hi);border:1px solid var(--line);}

  .tp-F{background:rgba(224,101,77,.16);color:#f0906f;border:1px solid rgba(224,101,77,.4);}

  .tbl th .ar{font-size:9px;margin-left:3px;color:var(--gold-hi);}

  .na{color:var(--dim);}

  .tbl tbody tr:nth-child(even) td{background:rgba(255,255,255,.022);}
  .tbl tbody tr.tsep td{background:rgba(212,175,55,.07);}
  .tbl td.sig,.tbl th.sig{background:rgba(212,175,55,.10);color:var(--gold-hi);font-weight:800;}
  .tbl td.grp,.tbl th.grp{border-left:1px solid var(--line2);}

  .rp-Citizen{background:rgba(224,101,77,.16);color:#f0906f;} .rp-Sheriff{background:rgba(240,217,138,.18);color:#f0d98a;}
  .rp-Mafia{background:rgba(150,178,204,.16);color:#c7d2e2;} .rp-Don{background:rgba(240,217,138,.10);color:#e6c56b;border:1px solid rgba(240,217,138,.3);}

  .seg button.on{background:linear-gradient(135deg,var(--gold-hi),var(--gold));color:#0a1626;}
  .demoflag{font-size:11.5px;color:#f0906f;font-weight:800;}

  .rcards .rcx .rt{font-size:11px;font-weight:800;}
  .rcards .rcx .rv{font-family:'Cinzel',serif;font-size:17px;font-weight:800;color:var(--gold-hi);margin-top:3px;}
  .rcards .rcx .rs{font-size:10.5px;color:var(--mut);}
  .plink{cursor:pointer;color:var(--ink);border-bottom:1px dotted var(--line2);}
  .plink:hover{color:var(--gold-hi);border-bottom-color:var(--gold);}
  .scrollT{overflow:auto;max-height:72vh;-webkit-overflow-scrolling:touch;border-radius:16px;}
  .statchips{display:flex;flex-wrap:wrap;gap:7px 14px;font-size:12px;color:var(--mut);margin:2px 0 12px;}
  .statchips b{color:var(--gold-hi);}
  .statchips .cred b{color:#f0906f;} .statchips .cblk b{color:#9cc0e6;}
  .rbtn.stg{font-family:'Cinzel',serif;font-size:12px;}
  .telo{margin-left:auto;font-size:10.5px;font-weight:800;color:var(--gold-hi);background:rgba(212,175,55,.14);border:1px solid var(--line2);border-radius:9px;padding:3px 8px;white-space:nowrap;}
  .telo.top{color:#7ce6a0;border-color:rgba(124,230,160,.4);background:rgba(124,230,160,.1);}

  .sheetbd{display:none;position:fixed;inset:0;background:transparent;z-index:75;}

  .popmenu{position:fixed;bottom:calc(66px + env(safe-area-inset-bottom));z-index:80;width:210px;

    transform:translateY(8px) scale(.97);opacity:0;pointer-events:none;transition:transform .16s ease,opacity .16s ease;box-shadow:0 12px 34px rgba(0,0,0,.5);}
  .popmenu.open{transform:none;opacity:1;pointer-events:auto;}

  .popmenu .pm-item.active .ic{color:var(--gold-hi);}

  .stub{text-align:center;padding:40px 20px;}
  .stub .si{font-size:40px;color:var(--gold);opacity:.7;}

  .stub p{color:var(--mut);font-size:13px;max-width:440px;margin:0 auto 16px;line-height:1.6;}
  .btn{padding:8px 14px;border-radius:10px;background:rgba(212,175,55,.1);border:1px solid var(--line);color:var(--gold-hi);font-size:12.5px;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;}

  .btn.ghost{background:transparent;}

  .tables{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}

  .pcnick{font-family:'Cinzel',serif;font-size:20px;font-weight:800;color:var(--gold-hi);line-height:1.05;}
  .pcreal{font-size:11.5px;color:var(--ink);opacity:.85;margin-top:2px;}
  .pctier{position:absolute;top:0;right:0;}
  .rate{display:flex;gap:6px;margin:12px 0 4px;}
  .rcell{flex:1;text-align:center;padding:7px 4px;border-radius:10px;background:rgba(7,15,28,.5);border:1px solid var(--line2);}
  .rcell .rk{font-size:8.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--dim);}
  .rcell .rv{font-size:15px;font-weight:800;color:var(--gold-hi);margin-top:3px;}
  .rcell .rv.na{color:var(--dim);}
  .csec{font-size:10px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:var(--gold);margin:14px 0 6px;display:flex;align-items:center;gap:8px;}
  .csec::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,rgba(212,175,55,.4),transparent);}
  .skipband{font-size:12px;font-weight:800;color:#f0d98a;background:rgba(224,101,77,.12);border:1px solid rgba(224,101,77,.35);border-radius:10px;padding:7px 11px;margin-bottom:8px;}
  .seattbl{width:100%;border-collapse:separate;border-spacing:0;border:1px solid var(--line2);border-radius:12px;overflow:hidden;font-size:13px;}
  .seattbl th{background:rgba(212,175,55,.08);color:var(--gold-hi);font-family:'Cinzel',serif;font-weight:700;font-size:11.5px;padding:7px 4px;text-align:center;border-bottom:1px solid var(--line2);}
  .seattbl td{padding:6px 4px;text-align:center;border-bottom:1px solid var(--line2);}
  .seattbl tr:last-child td{border-bottom:none;}
  .seattbl tr.rest td{background:rgba(224,101,77,.10);color:#f0906f;font-weight:800;font-style:italic;}
  .seattbl .gn{color:var(--gold-hi);font-weight:800;}
  .opp{font-size:12px;line-height:1.7;color:var(--ink);}
  .opp .cnt{display:inline-block;min-width:18px;text-align:center;background:var(--gold);color:#0a1626;border-radius:6px;font-size:10px;font-weight:800;padding:1px 5px;margin-right:6px;}
  .zero{font-size:11.5px;color:var(--mut);line-height:1.6;}
  .pick{width:100%;max-width:320px;padding:9px 12px;border-radius:10px;background:rgba(7,15,28,.6);border:1px solid var(--line);color:var(--ink);font-size:13px;font-weight:700;margin-bottom:14px;}
  .pick option{background:#0c1b30;}
  .mtop{display:none;}
  @media(max-width:1024px){
    :root{--nav-w:0px;}
    .shell{flex-direction:column;}
    .side{position:fixed;left:0;top:0;height:100vh;width:252px;z-index:60;transform:translateX(-100%);transition:transform .2s;box-shadow:0 0 40px rgba(0,0,0,.6);}
    .side.open{transform:none;}
    .backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:55;}
    .backdrop.on{display:block;}
    .mtop{display:flex;align-items:center;gap:12px;padding:10px 14px;position:sticky;top:0;z-index:40;background:rgba(10,22,38,.92);backdrop-filter:blur(6px);border-bottom:1px solid var(--line2);}
    .mtop .burger{width:40px;height:40px;border-radius:10px;border:1px solid var(--line);background:var(--panel);color:var(--gold-hi);font-size:18px;cursor:pointer;flex:none;}
    .mtop .mt{font-family:'Cinzel',serif;font-weight:800;color:var(--gold-hi);font-size:14px;}
    .main{padding:12px 12px 60px;}
    .topband{flex-direction:column;}
    .topband .poster{width:100%;}
    .topband .poster img{aspect-ratio:16/9;height:auto;}
    .stages{grid-template-columns:1fr;}
    .tables,.cardgrid{grid-template-columns:1fr;}
    .tbl td:nth-child(4),.tbl th:nth-child(4){display:none;}
  }
  /* ── mobile-app слой: нижний таб-бар + под-вкладки (перекрывает desktop) ── */
  .tabbar{display:none;}
  .subtabs{display:none;}
  .subtabs:empty{display:none;}
  @media(max-width:1024px){
    body{font-size:15px;}
    .side{display:none!important;}
    .backdrop{display:none!important;}
    .mtop{display:flex;align-items:center;gap:9px;padding:12px 15px;position:sticky;top:0;z-index:40;
      background:rgba(9,18,32,.97);backdrop-filter:blur(9px);border-bottom:1px solid var(--line2);}
    .mtop .burger{display:none;}
    .mtop .mcr{font-size:19px;color:var(--gold);text-shadow:0 0 10px rgba(212,175,55,.5);}
    .mtop .mt{font-family:'Cinzel',serif;font-weight:800;font-size:15px;color:var(--gold-hi);}
    .main{padding:12px 12px calc(80px + env(safe-area-inset-bottom));}
    .topband{margin-bottom:14px;}
    .subtabs{display:none;}
    .subtabs::-webkit-scrollbar{display:none;}
    .subtabs .st{flex:none;padding:10px 16px;border-radius:999px;font-size:13.5px;font-weight:800;border:1px solid var(--line2);
      background:rgba(255,255,255,.03);color:var(--mut);white-space:nowrap;cursor:pointer;}
    .subtabs .st.on{background:linear-gradient(135deg,var(--gold-hi),var(--gold));color:#0a1626;border-color:var(--gold);}
    .subtabs .st.locked{opacity:.4;}
    .tabbar{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:70;
      background:rgba(8,16,28,.98);backdrop-filter:blur(12px);border-top:1px solid var(--line);
      padding:7px 4px calc(7px + env(safe-area-inset-bottom));}
    .tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:5px 2px;border:none;
      background:none;color:var(--mut);font-size:10.5px;font-weight:800;cursor:pointer;letter-spacing:.2px;}
    .tabbar .tb .ti{font-size:21px;line-height:1;}
    .tabbar .tb.on{color:var(--gold-hi);}
    .tabbar .tb.on .ti{filter:drop-shadow(0 0 9px rgba(212,175,55,.7));}
    .rbtn{min-width:46px;min-height:46px;font-size:16px;}
    .btn{padding:11px 18px;}
    .pick{max-width:none;padding:12px 14px;font-size:15px;}
    .secttl{font-size:18px;}
    .panel{padding:14px;border-radius:14px;}
    .scell .sav{width:clamp(38px,13vw,52px);height:clamp(38px,13vw,52px);}
    .scell .sname{font-size:9.5px;}
    .seatgrid{grid-template-columns:repeat(5,1fr);gap:5px;padding:7px 5px;}
    .cluster .tf,.tfilter .tf{min-height:40px;padding:8px 13px;}
    #__refbtn{bottom:calc(90px + env(safe-area-inset-bottom))!important;left:12px!important;z-index:50!important;}
  }
</style>

<body>
<div class="backdrop" id="bd" onclick="toggleNav(false)"></div>
<div class="shell">
  <nav class="side" id="side">
    <div class="brand"><span class="cr">&#9819;</span>
      <div><div class="bt">Чемпионат<br>Европы 2026</div><div class="bs">Бонн · Германия · new</div></div>
    </div>
    <div id="nav"></div>
    <a class="toclassic" href="tournament.html?t=634">← классическая версия</a>
  </nav>
  <div style="flex:1;min-width:0;">
    <div class="mtop"><span class="mcr">&#9819;</span><span class="mt"><span style="color:var(--gold-hi)">ЧЕ 2026</span> · <span id="mtitle">Обзор</span></span></div>
    <main class="main">
      <div class="topband" id="topband"><div class="info"><p class="note">Загрузка…</p></div></div>
      <div class="subtabs" id="subtabs"></div>
      <div id="view"></div>
    </main>
    <nav class="tabbar" id="tabbar"></nav>
    <div class="sheetbd" id="sheetbd" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet"></div>
  </div>
</div>
<script src="data/streams.js"></script>
<script src="data/live.js"></script>
<script>
const ROMAN=['','I','II','III','IV'];
const TIERS=['S','A','B','C','D','E','F'];
const TIER_ORD={S:0,A:1,B:2,C:3,D:4,E:5,F:6};
const START='2026-07-18T10:00:00';
const DEF_AV='https://mafgame.org/build/assets/avatar-default2-33e44bae.png';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function mono(nick){return ((nick||'?').replace(/[^A-Za-zА-Яа-яЁё0-9]/g,'').slice(0,2).toUpperCase())||'·';}
function num(v){return (v==null||v==='')?null:+v;}
function plW(n,a,b,c){const m=Math.abs(n)%100,m1=m%10;if(m>10&&m<20)return c;if(m1>1&&m1<5)return b;if(m1===1)return a;return c;}
function players_w(n){return n+' '+plW(n,'игрок','игрока','игроков');}

const NAV=[
  {group:'Общее',ic:'◈',items:[{id:'overview',ic:'◆',lab:'Обзор'}]},
  {group:'Участники',ic:'≡',items:[{id:'roster',ic:'≡',lab:'Рейтинг · состав'}]},
  {group:'Рассадка',ic:'▦',items:[
    {id:'seating',ic:'▦',lab:'Интерактивная'},
    {id:'cards',ic:'♛',lab:'Карточки'},
    {id:'together',ic:'⇄',lab:'Пересечения'}]},
  {group:'Статистика',ic:'✦',items:[
    {id:'stages',ic:'⚑',lab:'Сводная'},
    {id:'games',ic:'▶',lab:'Игры'},
    {id:'roles',ic:'✦',lab:'Роли'},
    {id:'player',ic:'☰',lab:'Игрок'}]},
];
const SECTIONS=[]; NAV.forEach(g=>g.items.forEach(it=>SECTIONS.push(it)));

let D={}, cur='overview';

Promise.all([
  fetch('data/participants_634.json').then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data/tournament_634.json').then(r=>r.ok?r.json():{}).catch(()=>({})),
  fetch('data/avatars_634.json').then(r=>r.ok?r.json():{}).catch(()=>({})),
  fetch('data/elo_634.json').then(r=>r.ok?r.json():null).catch(()=>null),
  fetch('data/skip_634.json').then(r=>r.ok?r.json():null).catch(()=>null),
  (window.loadGames?window.loadGames('634'):Promise.resolve(null)).catch(()=>null)
]).then(([P,T,A,E,S,G])=>{
  D.players=(P&&P.players)||[];D.meta=(P&&P.meta)||{};D.stats=(P&&P.stats)||{};D.tour=T||{};
  D.judges=(A&&A.judges)||{};D.avatars=(A&&A.avatars)||{};D.elo=(E&&E.players)||{};D.skip=S||{};D.games=(G&&G.games)||[];
  D.realGames=D.games;D.realPlayed=(T.games_played||0);D.demo=false;
  computeSeating();computeStats();buildNav();buildTabbar();renderTop();
  show((location.hash||'').replace('#','')||'overview');
}).catch(()=>{document.getElementById('view').innerHTML='<div class="stub"><div class="si">&#9888;</div><h3>Нет данных</h3><p>Не удалось загрузить данные турнира.</p></div>';});

function computeSeating(){
  D.occ={};D.opp={};D.seatByGame={};D.played=0;
  D.games.forEach((g,gi)=>{const gnum=gi+1;D.seatByGame[gnum]={};let done=g.tables.length>0;
    g.tables.forEach(t=>{const names=t.seats.map(s=>s.name);D.seatByGame[gnum][t.table_num]=names;if(t.winner==='unknown')done=false;
      names.forEach((n,i)=>{(D.occ[n]=D.occ[n]||[]).push({g:gnum,t:t.table_num,slot:i+1});
        names.forEach(m=>{if(m!==n){(D.opp[n]=D.opp[n]||{})[m]=(D.opp[n][m]||0)+1;}});});});
    if(done)D.played=gnum;});
  D.INFO={};D.RATE={};
  D.players.forEach(p=>{D.INFO[p.nick]={real:p.real};D.RATE[p.nick]={tier:p.r_tier,elo:p.r_elo_cur,elo26:p.r_elo_2026,eu:p.r_rank_eu_2026,mid:p.markery_id,uid:p.uid,msid:p.ms&&p.ms.id,av:p.av};});
}
function avOf(n){return D.avatars[n]||(D.RATE[n]&&D.RATE[n].av)||'';}

function buildNav(){
  const el=document.getElementById('nav');
  el.innerHTML=NAV.map(g=>`<div class="navgrp"><span class="gi">${g.ic}</span>${esc(g.group)}</div>`+
    g.items.map(s=>{const cls=s.locked?'navbtn locked':'navbtn'+(s.id===cur?' active':'');const tag=s.locked?'<span class="tag">скоро</span>':'';
      return `<button class="${cls}" data-id="${s.id}"><span class="ic">${s.ic}</span><span class="lb">${esc(s.lab)}</span>${tag}</button>`;}).join('')).join('');
  el.querySelectorAll('.navbtn:not(.locked)').forEach(b=>b.onclick=()=>{show(b.dataset.id);toggleNav(false);});
}
function toggleNav(open){const s=document.getElementById('side'),b=document.getElementById('bd');if(s)s.classList.toggle('open',open);if(b)b.classList.toggle('on',open);}
function buildTabbar(){
  const el=document.getElementById('tabbar');
  el.innerHTML=NAV.map((g,i)=>`<button class="tb" data-gi="${i}"><span class="ti">${g.ic}</span>${esc(g.group)}</button>`).join('');
  el.querySelectorAll('.tb').forEach(b=>b.onclick=()=>openGroup(+b.dataset.gi));
}
function openGroup(i){const g=NAV[i];if(g.items.length===1){const it=g.items[0];if(!it.locked)show(it.id);return;}openSheet(i);}
function openSheet(i){const g=NAV[i];const pm=document.getElementById('sheet');
  pm.className='popmenu';
  pm.innerHTML='<div class="pm-arrow" id="pmArrow"></div>'+g.items.map(it=>`<button class="pm-item ${it.id===cur?'active':''} ${it.locked?'locked':''}"${it.locked?'':` data-id="${it.id}"`}><span class="ic">${it.ic}</span><span>${esc(it.lab)}</span>${it.locked?'<span style="margin-left:auto;font-size:9.5px;color:var(--dim)">скоро</span>':''}</button>`).join('');
  const w=210,vw=window.innerWidth,tb=document.querySelectorAll('.tabbar .tb')[i];
  let cx=vw/2;if(tb){const r=tb.getBoundingClientRect();cx=r.left+r.width/2;}
  const left=Math.max(8,Math.min(cx-w/2,vw-w-8));
  pm.style.width=w+'px';pm.style.left=left+'px';
  const ar=document.getElementById('pmArrow');if(ar)ar.style.left=Math.max(14,Math.min(cx-left,w-14))+'px';
  pm.querySelectorAll('.pm-item[data-id]').forEach(b=>b.onclick=()=>{closeSheet();show(b.dataset.id);});
  document.getElementById('sheetbd').classList.add('on');requestAnimationFrame(()=>pm.classList.add('open'));
}
function closeSheet(){const pm=document.getElementById('sheet');if(pm)pm.classList.remove('open');const bd=document.getElementById('sheetbd');if(bd)bd.classList.remove('on');}

function renderTop(){
  const t=D.tour,m=D.meta;
  const eloVals=D.players.map(p=>num(p.r_elo_cur)).filter(v=>v!=null);
  const eloAvg=eloVals.length?Math.round(eloVals.reduce((a,b)=>a+b,0)/eloVals.length):null;
  const started=(t.games_played||0)>0;
  document.getElementById('topband').innerHTML=`
    <div class="poster"><img src="assets/bonn634_card.jpg" alt="Чемпионат Европы 2026 · Бонн"></div>
    <div class="info"><h1>Чемпионат Европы 2026</h1>
      <div class="meta">18–19 июля 2026 · Бонн, Германия · ${'★'.repeat(t.stars||5)}</div>
      <div class="chips">
        <span class="chip">Приз <b>${t.prize_eur?t.prize_eur+'€':'—'}</b></span>
        <span class="chip"><b>${D.players.length}</b> из ${m.expected||D.players.length} игроков</span>
        <span class="chip">Ожид. ср. ELO <b>${eloAvg!=null?eloAvg:'—'}</b> · markery</span>
        <span class="chip ${started?'live':''}">${started?'● идёт · игра '+t.games_played+'/'+t.games_total:'скоро · старт 18 июля'}</span>
      </div>${started?'':'<div class="cdown" id="cdown"></div>'}</div>`;
  if(!started)tick();
}
function tick(){const el=document.getElementById('cdown');if(!el)return;
  let diff=Math.max(0,(new Date(START)-new Date())/1000);
  const d=Math.floor(diff/86400),h=Math.floor(diff%86400/3600),mi=Math.floor(diff%3600/60);
  el.innerHTML=[[d,'дней'],[h,'часов'],[mi,'минут']].map(x=>`<div class="cu"><div class="n">${x[0]}</div><div class="l">${x[1]}</div></div>`).join('');setTimeout(tick,30000);}

function show(id){
  const s=SECTIONS.find(x=>x.id===id&&!x.locked);if(!s)id='overview';cur=id;
  try{history.replaceState(null,'','#'+id);}catch(e){}
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.toggle('active',b.dataset.id===id));
  const lab=(SECTIONS.find(x=>x.id===id)||{}).lab||'Обзор';const mt=document.getElementById('mtitle');if(mt)mt.textContent=lab;
  const gi=NAV.findIndex(g=>g.items.some(it=>it.id===id));
  document.querySelectorAll('.tabbar .tb').forEach(b=>b.classList.toggle('on',+b.dataset.gi===gi));
  const grp=NAV[gi],st=document.getElementById('subtabs');
  if(st){ if(grp&&grp.items.length>1){st.innerHTML=grp.items.map(it=>`<button class="st${it.id===id?' on':''}${it.locked?' locked':''}"${it.locked?'':` data-id="${it.id}"`}>${esc(it.lab)}</button>`).join('');st.querySelectorAll('.st[data-id]').forEach(b=>b.onclick=()=>show(b.dataset.id));} else st.innerHTML=''; }
  const mob=window.matchMedia&&window.matchMedia('(max-width:820px)').matches;
  const tbp=document.getElementById('topband');if(tbp)tbp.style.display=(mob&&id!=='overview')?'none':'';
  document.getElementById('view').innerHTML=(RENDER[id]?RENDER[id]():stub(id));afterRender(id);
  window.scrollTo({top:0,behavior:'smooth'});
}

const RENDER={
  overview(){
    const t=D.tour,m=D.meta,tc=D.stats.tiers||{};
    const eloVals=D.players.map(p=>num(p.r_elo_cur)).filter(v=>v!=null);
    const eloAvg=eloVals.length?Math.round(eloVals.reduce((a,b)=>a+b,0)/eloVals.length):null;
    const stats=`<div class="stats">
      <div class="stat"><div class="k">Формат</div><div class="v">11+2+4<small> игр</small></div></div>
      <div class="stat"><div class="k">Участников</div><div class="v">${D.players.length}<small> из ${m.expected||D.players.length}</small></div></div>
      <div class="stat"><div class="k">Ожид. ср. ELO</div><div class="v">${eloAvg!=null?eloAvg:'—'}<small> markery</small></div></div>
      <div class="stat"><div class="k">Приз</div><div class="v">${t.prize_eur||'—'}<small>€</small></div></div></div>`;
    const jud=Object.keys(D.judges).length?`<div class="panel"><h3>Судьи столов</h3><div class="judges">`+
      Object.keys(D.judges).sort().map(k=>{const j=D.judges[k];return `<div class="judge">${j.avatar?`<img src="${esc(j.avatar)}" referrerpolicy="no-referrer" onerror="this.style.display='none'">`:''}<div><div class="jn">Стол ${ROMAN[k]||k} · <b>${esc(j.name)}</b></div>${j.tg?`<div class="jt">${esc(j.tg)}</div>`:''}</div></div>`;}).join('')+`</div></div>`:'';
    return `<div class="view"><div class="secttl">&#9670; Обзор турнира</div>
      ${demoPanel()}
      <div class="panel">${stats}<div class="note">Титульный турнир сезона: победитель становится чемпионом Европы. Данные тянутся с mafgame вживую — статистика включится автоматически после первой игры.</div></div>
      ${stagesPanel()}
      <div class="panel"><h3>Ранги состава (markery)</h3><div class="tfilter">`+
        TIERS.filter(x=>tc[x]).map(x=>`<span class="tf on" style="cursor:default"><span class="tpill tp-${x}">${x}</span><small>${tc[x]}</small></span>`).join('')+
      `</div><div class="note">Ранг S..F по границам markery, снимок ${esc(D.stats.snapshot||'2026-07-15')}. Полный список — «Участники · рейтинг».</div></div>${jud}</div>`;
  },
  seating(){
    if(!D.games.length)return `<div class="view"><div class="secttl">&#9638; Интерактивная рассадка</div><div class="panel"><div class="stub"><div class="si">&#9638;</div><h3>Рассадка недоступна</h3><p>Данные рассадки не загрузились.</p></div></div></div>`;
    return `<div class="view"><div class="secttl">&#9638; Интерактивная рассадка</div>
      <div class="note" style="margin:0 0 12px">11 игр × 4 стола · каждый играет 10 из 11 (одну отдыхает) · тап по игроку — все его столы. «Место» = место за столом (слот 1–10).</div>
      <div id="seatArea"></div></div>`;
  },
  cards(){return `<div class="view"><div class="secttl">&#9819; Карточки игроков</div>
      <div class="note" style="margin:0 0 10px">Выберите ранг — карточки грузятся кластером, чтобы не тянуть все 44 сразу.</div>
      <div class="cluster" id="cCluster"></div><div id="cardArea"></div></div>`;},
  roster(){return `<div class="view"><div class="secttl">&#8801; Участники · рейтинг</div>
      <div class="tfilter" id="tfil"></div>
      <div class="panel" style="padding:6px 6px 4px;overflow-x:auto;"><table class="tbl"><thead><tr id="rhr"></tr></thead><tbody id="rtb"></tbody></table></div>
      <div class="note">Рейтинг markery — снимок через API на ${esc(D.stats.snapshot||'2026-07-15')}. «ELO тек» — текущий ELO (глобально); «Ранг» — тир S..F; «ELO 2026» — за сезон 2026; «Европа 2026» — место Европа‑2026. Тап по «Ранг» группирует по тирам. «—» — нет данных markery. Список и составы — с mafgame.org.</div></div>`;},
  together(){

function aggregateN(list){
  const P={};let red=0,black=0,tables=0,apsSum=0;const rr=()=>({sigma:0,g:0,w:0});
  const get=n=>P[n]||(P[n]={name:n,wpts:0,aps:0,ci:0,g:0,w:0,k:0,roles:{Citizen:rr(),Sheriff:rr(),Mafia:rr(),Don:rr()}});
  list.forEach(g=>g.tables.forEach(t=>{if(t.winner==='unknown')return;tables++;if(t.winner==='red_win')red++;else if(t.winner==='black_win')black++;
    t.seats.forEach(s=>{if(!s.name)return;const p=get(s.name);const sig=(s.wpts||0)+(s.aps||0)+(s.ci||0);
      p.wpts+=s.wpts||0;p.aps+=s.aps||0;p.ci+=s.ci||0;p.g++;if(s.result==='W')p.w++;if(s.marker==='first_killed')p.k++;apsSum+=s.aps||0;
      if(s.role&&p.roles[s.role]){const r=p.roles[s.role];r.sigma+=sig;r.g++;if(s.result==='W')r.w++;}});}));
  const rows=Object.values(P).map(p=>({...p,sigma:+(p.wpts+p.aps+p.ci).toFixed(2)}));
  rows.sort((a,b)=>b.sigma-a.sigma||b.aps-a.aps||a.name.localeCompare(b.name,'ru'));rows.forEach((r,i)=>r.place=i+1);
  return {rows,red,black,tables,apsSum};
}
function makeDemo(){
  const rnd=(a,b)=>a+Math.random()*(b-a);
  const shuf=a=>{a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));const t=a[i];a[i]=a[j];a[j]=t;}return a;};
  function playTable(names,tn){const n=names.length;const roles=shuf(['Don','Mafia','Mafia','Sheriff'].concat(Array(Math.max(0,n-4)).fill('Citizen')));
    const winner=Math.random()<0.5?'red_win':'black_win';const fk=Math.floor(Math.random()*n);
    const seats=names.map((nm,i)=>{const role=roles[i]||'Citizen';const isRed=(role==='Citizen'||role==='Sheriff');const win=((winner==='red_win')===isRed);
      return {seat:i+1,name:nm,role,result:win?'W':'L',wpts:win?+rnd(0.7,1).toFixed(2):0,aps:+rnd(-0.2,0.6).toFixed(2),ci:+rnd(0,0.3).toFixed(2),marker:i===fk?'first_killed':null};});
    return {table_num:tn,judge:(D.games[0]&&D.games[0].tables[tn-1]&&D.games[0].tables[tn-1].judge)||'',winner,seats};}
  function splitPlay(names,nt){const per=Math.ceil(names.length/nt);const tbs=[];for(let ti=0;ti<nt;ti++){const chunk=names.slice(ti*per,(ti+1)*per);if(chunk.length)tbs.push(playTable(chunk,ti+1));}return tbs;}
  const quals=(D.realGames||[]).map((g,i)=>({title:'Game '+(i+1),stage:'Квалификация',tables:g.tables.map(t=>playTable(t.seats.map(s=>s.name),t.table_num))}));
  const top40=aggregateN(quals).rows.slice(0,40).map(r=>r.name);
  const semis=[0,1].map(gi=>({title:'Полуфинал '+(gi+1),stage:'Полуфинал',tables:splitPlay(shuf(top40),4)}));
  const top10=aggregateN(semis).rows.slice(0,10).map(r=>r.name);
  const finals=[0,1,2,3].map(gi=>({title:'Финал '+(gi+1),stage:'Финал',tables:[playTable(top10.slice(),1)]}));
  return quals.concat(semis,finals);
}
function computeStats(){

  D.rows=agg.rows;D.STAT={};agg.rows.forEach(r=>D.STAT[r.name]=r);
  D.redWins=agg.red;D.blackWins=agg.black;D.aps=agg.apsSum;D.tbls=agg.tables;
  D.stagesPresent=['Квалификация','Полуфинал','Финал'].filter(st=>D.gplist.some(g=>(g.stage||'Квалификация')===st));

}

    <div class="stage"><span class="sbadge">старт</span><div class="sn">Квалификация</div><div class="sg">11 игр · 4 стола · каждый играет 10</div><div class="sd">Все 44 играют квалификацию, одну игру отдыхают. По сумме — топ‑40 в полуфинал.</div></div>
    <div class="stage"><div class="sn">Полуфинал</div><div class="sg">2 игры · топ‑40</div><div class="sd">40 лучших по квалификации играют 2 игры. По сумме — топ‑10 финала.</div></div>
    <div class="stage"><div class="sn">Финал</div><div class="sg">4 игры · топ‑10</div><div class="sd">10 сильнейших разыгрывают титул чемпиона Европы за финальным столом.</div></div></div></div>`;}

function afterRender(id){if(id==='roster')paintRoster();else if(id==='seating')initSeating();else if(id==='cards')initCards();else if(id==='together')initTogether();else if(id==='stages'||id==='games'||id==='roles'||id==='player')afterStats(id);}

/* roster */
const RCOLS=[{key:'tier',lab:'Ранг',dir:1,get:p=>p.r_tier,fmt:'tier'},{key:'elo_cur',lab:'ELO тек',dir:-1,get:p=>p.r_elo_cur,fmt:'elo'},{key:'elo_2026',lab:'ELO 2026',dir:-1,get:p=>p.r_elo_2026,fmt:'elo'},{key:'eu26',lab:'Европа 2026',dir:1,get:p=>p.r_rank_eu_2026,fmt:'rank'}];
let rSortKey='tier',rSortDir=1,rFilter=null;
function colVal(c,p){const v=c.get(p);if(c.fmt==='tier')return (v in TIER_ORD)?TIER_ORD[v]:null;return num(v);}
function avatarCell(p){const f=(p.r_tier in TIER_ORD)?(' f-'+p.r_tier):'';
  if(p.av)return `<img class="av${f}" src="${esc(p.av)}" referrerpolicy="no-referrer" loading="lazy" alt="" onerror="this.outerHTML='<span class=\\'mono\\'>'+this.dataset.m+'</span>'" data-m="${esc(mono(p.nick))}">`;
  return `<span class="mono">${esc(mono(p.nick))}</span>`;}
function paintRoster(){
  const tc=D.stats.tiers||{};const fil=document.getElementById('tfil');
  if(fil){fil.innerHTML='<span class="lbl">Фильтр по рангу:</span>'+
    `<span class="tf ${rFilter?'':'on'}" data-t="">Все <small>${D.players.length}</small></span>`+
    TIERS.filter(x=>tc[x]).map(x=>`<span class="tf ${rFilter===x?'on':''}" data-t="${x}"><span class="tpill tp-${x}">${x}</span><small>${tc[x]}</small></span>`).join('');
    fil.querySelectorAll('.tf').forEach(b=>b.onclick=()=>{rFilter=b.dataset.t||null;paintRoster();});}
  const hr=document.getElementById('rhr');
  hr.innerHTML='<th class="l" data-k="player">Игрок<span class="ar"></span></th>'+RCOLS.map(c=>`<th data-k="${c.key}">${esc(c.lab)}<span class="ar"></span></th>`).join('')+'<th class="l" style="cursor:default">Профиль</th>';
  hr.querySelectorAll('th[data-k]').forEach(el=>el.onclick=()=>{const k=el.dataset.k;
    if(k==='player')rSortKey='player';else if(rSortKey===k)rSortDir=-rSortDir;else{rSortKey=k;rSortDir=(RCOLS.find(c=>c.key===k)||{}).dir||-1;}paintRoster();});
  let list=D.players.slice();if(rFilter)list=list.filter(p=>p.r_tier===rFilter);
  if(rSortKey==='player')list.sort((a,b)=>a.nick.localeCompare(b.nick,'ru'));
  else{const col=RCOLS.find(c=>c.key===rSortKey);list.sort((a,b)=>{const va=colVal(col,a),vb=colVal(col,b);
    if(va==null&&vb==null)return a.nick.localeCompare(b.nick,'ru');if(va==null)return 1;if(vb==null)return -1;
    if(va===vb){const ea=num(a.r_elo_cur),eb=num(b.r_elo_cur);if(ea!=null&&eb!=null&&ea!==eb)return eb-ea;return a.nick.localeCompare(b.nick,'ru');}return (va-vb)*rSortDir;});}
  document.querySelectorAll('#rhr th').forEach(th=>{const ar=th.querySelector('.ar');if(!ar)return;if(th.dataset.k===rSortKey)ar.textContent=(rSortKey!=='player'&&rSortDir<0)?'▼':'▲';else ar.textContent='';});
  const grouping=(rSortKey==='tier'&&!rFilter);let html='',prev=null;
  list.forEach((p,i)=>{
    if(grouping){const key=(p.r_tier in TIER_ORD)?p.r_tier:'—';if(key!==prev){const badge=(key in TIER_ORD)?`<span class="tpill tp-${key}">${key}</span>`:'<span class="na">—</span>';
      const cnt=list.filter(x=>((x.r_tier in TIER_ORD)?x.r_tier:'—')===key).length;
      html+=`<tr class="tsep"><td colspan="6">${badge} &nbsp;ранг ${key in TIER_ORD?key:'без данных'} · ${players_w(cnt)}</td></tr>`;prev=key;}}
    const links=[];
    if(p.uid)links.push(`<a class="lnk" href="https://mafgame.org/user/${p.uid}/view" target="_blank" rel="noopener">mafgame</a>`);
    if(p.markery_id)links.push(`<a class="lnk" href="https://markery.online/playerStatistics?eloType=101&playerId=${p.markery_id}&tab=EloHistory" target="_blank" rel="noopener">markery</a>`);
    if(p.ms&&p.ms.id)links.push(`<a class="lnk" href="https://mafiastats.com/players/${p.ms.id}" target="_blank" rel="noopener">mafiastats</a>`);
    const sub=p.real?`<div class="pl-real">${esc(p.real)}</div>`:'';const et=num(p.r_elo_cur),e26=num(p.r_elo_2026),eu=num(p.r_rank_eu_2026);
    html+=`<tr class="${p.status==='confirmed'?'':'applied'}"><td class="l"><div class="pl"><span class="num">${i+1}</span>${avatarCell(p)}<span><span class="pl-nick">${esc(p.nick)}</span>${sub}</span></div></td>
      <td>${(p.r_tier in TIER_ORD)?`<span class="tpill tp-${p.r_tier}">${p.r_tier}</span>`:'<span class="na">—</span>'}</td>
      <td>${et!=null?`<span class="rnum">${Math.round(et)}</span>`:'<span class="na">—</span>'}</td>
      <td>${e26!=null?`<span class="rnum">${Math.round(e26)}</span>`:'<span class="na">—</span>'}</td>
      <td>${eu!=null?`<span class="rrank"><span class="h">#</span>${eu}</span>`:'<span class="na">—</span>'}</td>
      <td class="l">${links.join(' ')||'<span class="na">—</span>'}</td></tr>`;});
  document.getElementById('rtb').innerHTML=html;
}

/* seating (grid) */
let seatMode='games',seatGame=1,seatPlayer=null;
function initSeating(){seatMode='games';seatGame=Math.min((D.played||0)+1,D.games.length)||1;drawSeating();}
function drawSeating(){
  const area=document.getElementById('seatArea');if(!area)return;
  if(seatMode==='player'&&seatPlayer){
    const occ=(D.occ[seatPlayer]||[]).slice().sort((a,b)=>a.g-b.g);const tc={};occ.forEach(o=>tc[o.t]=(tc[o.t]||0)+1);const skip=D.skip[seatPlayer];
    area.innerHTML=`<div class="phdr"><img src="${esc(avOf(seatPlayer)||DEF_AV)}" referrerpolicy="no-referrer" onerror="this.src='${DEF_AV}'">
      <div><div class="pn">${esc(seatPlayer)}</div><div class="ps">${occ.length} игр${skip?' · пропуск игры '+skip:''} · ${Object.keys(tc).sort().map(t=>'Стол '+ROMAN[t]+' — '+tc[t]).join(' · ')}</div></div>
      <button class="btn ghost" style="margin-left:auto" onclick="seatMode='games';drawSeating()">← к играм</button></div>
      <div class="tables">${occ.map(o=>tableHtml(o.g,o.t,seatPlayer,true)).join('')}</div>`;
  }else{
    const rounds=D.games.map((_,i)=>{const g=i+1;const cls=g<=D.played?'played':(g===D.played+1?'next':'upcoming');return `<button class="rbtn ${cls} ${g===seatGame?'active':''}" onclick="seatGame=${g};drawSeating()">${g}</button>`;}).join('');
    const tables=Object.keys(D.seatByGame[seatGame]||{}).map(Number).sort((a,b)=>a-b).map(t=>tableHtml(seatGame,t,null,false)).join('');
    area.innerHTML=`<div class="rounds">${rounds}</div><div class="tables">${tables}</div>`;
  }
  area.querySelectorAll('.scell:not(.empty)').forEach(s=>s.onclick=()=>{seatPlayer=s.dataset.p;seatMode='player';drawSeating();window.scrollTo({top:0,behavior:'smooth'});});
}
function tableHtml(g,t,target,showG){
  const names=(D.seatByGame[g]||{})[t]||[];let cells='';
  for(let i=0;i<10;i++){const p=names[i]||'';const tier=(D.RATE[p]&&D.RATE[p].tier&&D.RATE[p].tier in TIER_ORD)?D.RATE[p].tier:null;
    cells+=`<div class="scell${p===target?' tgt':''}${p?'':' empty'}" data-p="${esc(p)}"><div class="snum">${i+1}</div>
      <img class="sav ${tier?'f-'+tier:''}" src="${esc(avOf(p)||'')}" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='${DEF_AV}'">
      <div class="sname">${esc(p)||'—'}</div></div>`;}
  const j=D.judges[t];const jh=j?`<span class="tjudge"><img src="${esc(j.avatar||'')}" referrerpolicy="no-referrer" onerror="this.style.opacity=.2"> ${esc(j.name)}</span>`:'';
  const eloAvg=ns=>{const v=ns.map(x=>D.RATE[x]&&D.RATE[x].elo).filter(Boolean);return v.length?v.reduce((a,b)=>a+b,0)/v.length:0;};
  const my=eloAvg(names);let eloBadge='';
  if(my>0){const allT=Object.keys(D.seatByGame[g]||{}).map(k=>eloAvg(D.seatByGame[g][k])).filter(x=>x>0);
    const nt=allT.length,rank=allT.filter(x=>x>my+0.001).length+1;
    const cls=nt>1?(rank===1?'top':(rank===nt?'low':'')):'';const lbl=nt>1?(rank===1?'сильнейший стол':(rank===nt?'слабейший стол':'#'+rank+' из '+nt+' по ELO')):'ELO стола';
    eloBadge=`<span class="telo ${cls}" title="средний ELO стола">Ø ${Math.round(my)} · ${lbl}</span>`;}
  return `<div class="twrap"><div class="thdr">${showG?`<span class="tgl">Игра ${g}</span>`:''}<span class="tnum">Стол ${ROMAN[t]}</span>${jh}${eloBadge}</div><div class="seatgrid">${cells}</div></div>`;
}

/* cards */
function cardsByTier(){const by={};Object.keys(D.occ).forEach(n=>{const t=(D.RATE[n]&&D.RATE[n].tier&&D.RATE[n].tier in TIER_ORD)?D.RATE[n].tier:'—';(by[t]=by[t]||[]).push(n);});
  Object.keys(by).forEach(t=>by[t].sort((a,b)=>{const ea=(D.RATE[a]&&D.RATE[a].elo)||0,eb=(D.RATE[b]&&D.RATE[b].elo)||0;return eb-ea||a.localeCompare(b,'ru');}));return by;}
let cardTier=null;
function initCards(){const by=cardsByTier();const cl=document.getElementById('cCluster');
  cl.innerHTML='<span class="lbl" style="font-size:11px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--dim)">Ранг:</span>'+
    TIERS.filter(t=>by[t]).map(t=>`<button class="tf" data-t="${t}"><span class="tpill tp-${t}">${t}</span><small>${by[t].length}</small></button>`).join('')+
    (by['—']?`<button class="tf" data-t="—">— <small>${by['—'].length}</small></button>`:'');
  cl.querySelectorAll('.tf[data-t]').forEach(b=>b.onclick=()=>{cardTier=b.dataset.t;drawCards();});drawCards();}
function drawCards(){const by=cardsByTier();document.querySelectorAll('#cCluster .tf').forEach(b=>b.classList.toggle('on',b.dataset.t===cardTier));
  const area=document.getElementById('cardArea');
  if(!cardTier){area.innerHTML='<div class="panel"><div class="stub"><div class="si">&#9819;</div><h3>Выберите ранг сверху</h3><p>Карточки игроков этого ранга откроются здесь. Так страница грузится быстрее.</p></div></div>';return;}
  area.innerHTML=`<div class="cardgrid">${(by[cardTier]||[]).map(cardHtml).join('')}</div>`;}
function cardHtml(nick){
  const R=D.RATE[nick]||{},info=D.INFO[nick]||{},occ=(D.occ[nick]||[]),skip=D.skip[nick],total=D.games.length;
  const bySlot={};occ.forEach(o=>bySlot[o.g]={t:o.t,slot:o.slot});let rows='';
  for(let g=1;g<=total;g++){if(g===skip)rows+=`<tr class="rest"><td class="gn">${g}</td><td colspan="2">— отдых —</td></tr>`;
    else if(bySlot[g])rows+=`<tr><td class="gn">${g}</td><td>${ROMAN[bySlot[g].t]}</td><td>${bySlot[g].slot}</td></tr>`;}
  const opp=D.opp[nick]||{};const groups={};Object.entries(opp).forEach(([m,c])=>{(groups[c]=groups[c]||[]).push(m);});
  const oppHtml=Object.keys(groups).sort((a,b)=>b-a).slice(0,4).map(c=>`<div><span class="cnt">${c}</span>${groups[c].sort((x,y)=>x.localeCompare(y,'ru')).map(esc).join(', ')}</div>`).join('')||'<div class="zero">—</div>';
  const met=new Set(Object.keys(opp));const never=Object.keys(D.occ).filter(n=>n!==nick&&!met.has(n)).sort((a,b)=>a.localeCompare(b,'ru'));
  const tier=(R.tier in TIER_ORD)?R.tier:null;const rc=(k,v,na)=>`<div class="rcell"><div class="rk">${k}</div><div class="rv${na?' na':''}">${v}</div></div>`;
  return `<div class="pcard" id="c-${esc(nick)}"><div class="pcrown">&#9819;</div>
    <div class="pchead"><img class="pcav ${tier?'f-'+tier:''}" src="${esc(avOf(nick)||'')}" referrerpolicy="no-referrer" loading="lazy" onerror="this.src='${DEF_AV}'">
      <div><div class="pcnick">${esc(nick)}</div>${info.real?`<div class="pcreal">${esc(info.real)}</div>`:''}</div>
      <div class="pctier">${tier?`<span class="tpill tp-${tier}">${tier}</span>`:''}</div></div>
    <div class="rate">${rc('ELO тек',R.elo?Math.round(R.elo):'—',!R.elo)}${rc('ELO 2026',R.elo26?Math.round(R.elo26):'—',!R.elo26)}${rc('Европа 26',R.eu?('#'+R.eu):'—',!R.eu)}</div>
    <div class="csec">Рассадка по играм</div>
    ${skip?`<div class="skipband">&#9208; Пропуск игры ${skip} — отдыхает</div>`:''}
    <table class="seattbl"><thead><tr><th>Игра</th><th>Стол</th><th>Место</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="csec">Соперники (общих игр)</div><div class="opp">${oppHtml}</div>
    <div class="csec">0 игр — ни разу не встречает (${never.length})</div><div class="zero">${never.length?never.map(esc).join(', '):'встречает всех'}</div></div>`;
}

/* together */
function initTogether(){const sel=document.getElementById('togSel');if(!sel)return;sel.onchange=()=>drawTogether(sel.value);drawTogether(sel.value);}
function drawTogether(nick){const area=document.getElementById('togArea');if(!area)return;
  const opp=D.opp[nick]||{};const groups={};Object.entries(opp).forEach(([m,c])=>{(groups[c]=groups[c]||[]).push(m);});
  const met=new Set(Object.keys(opp));const never=Object.keys(D.occ).filter(n=>n!==nick&&!met.has(n)).sort((a,b)=>a.localeCompare(b,'ru'));
  const rows=Object.keys(groups).sort((a,b)=>b-a).map(c=>`<div style="margin-bottom:6px"><span class="cnt">${c} игр</span> ${groups[c].sort((x,y)=>x.localeCompare(y,'ru')).map(esc).join(', ')}</div>`).join('');
  area.innerHTML=`<div class="phdr"><img src="${esc(avOf(nick)||DEF_AV)}" referrerpolicy="no-referrer" onerror="this.src='${DEF_AV}'"><div><div class="pn">${esc(nick)}</div><div class="ps">${(D.occ[nick]||[]).length} игр · сидит с ${players_w(met.size)}</div></div></div>
    <div class="panel"><h3>Сколько раз с кем</h3><div class="opp">${rows||'—'}</div></div>
    <div class="panel"><h3>Ни разу за столом (${never.length})</h3><div class="zero">${never.length?never.map(esc).join(', '):'пересекается со всеми'}</div></div>`;}

function stub(id){const s=SECTIONS.find(x=>x.id===id)||{};
  return `<div class="view"><div class="secttl">${s.ic||'◆'} ${esc(s.lab||'')}</div><div class="panel"><div class="stub"><div class="si">${s.ic||'◆'}</div><h3>Откроется после старта</h3>
    <p>Игры, роли и статистика игрока появятся здесь автоматически после первой сыгранной игры (18 июля). До старта доступны рассадка, карточки и составы.</p></div></div></div>`;}
</script>
