<!DOCTYPE html>
<html lang="ru">
<head>
<!-- build v9.3 · 2026-07-15 · ЧЕ-634: свежий markery-снапшот (после Польши/Кёльна), ростер 44 подтв.; колонки Ранг(тир) / ELO тек / ELO 2026 / Европа 2026; тиры с цветом и группировкой + распределение -->
<!-- MafgameStat · participants.html · v1.0 · 2026-06-20 · УНИВЕРСАЛЬНАЯ страница участников для турниров статуса «собирается»:
     заявки mafgame (подтв./заявки/лист ожидания) + ДВОЙНОЙ рейтинг markery(основной)+mafiastats(сверка),
     счётчик «ожидаемый средний ELO» (markery) на постере, ссылки на профили, флаги неоднозначных матчей.
     Данные: data/participants_{t}.json (снапшот), реестр data/tournaments.js. -->
<meta charset="utf-8">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Участники и рейтинг — MafgameStat</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0b0b0e; --panel:#131318; --panel2:#17171d;
    --accent:#c9a14d; --gold:#c9a14d; --gold-hi:#e8c87a;
    --ink:#f2efe8; --mut:#9b97a8; --dim:#5c5965;
    --hairline:rgba(232,200,122,.14);
    --ok:#67e08f; --warn:#e8b94d; --bad:#e0654d;
  }
  *{box-sizing:border-box;-webkit-font-smoothing:antialiased;}
  html,body{max-width:100%;overflow-x:hidden;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:'Manrope',-apple-system,sans-serif;min-height:100vh;}
  .wrap{max-width:860px;margin:0 auto;padding:24px 16px 70px;position:relative;}
  a{color:var(--accent);text-decoration:none;}
  .back{display:inline-block;color:var(--mut);font-size:13px;margin-bottom:16px;}
  .back:hover{color:var(--accent);}

  /* ── шапка-постер со счётчиком ── */
  .hero{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--hairline);
    background:linear-gradient(160deg,var(--panel2),var(--panel));margin-bottom:8px;box-shadow:0 18px 44px rgba(0,0,0,.5);}
  .hero img{display:block;width:100%;object-fit:cover;max-height:300px;}
  .hero .ov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,8,11,.05) 0%,rgba(8,8,11,.35) 55%,rgba(8,8,11,.86) 100%);}
  .hero .meter{position:absolute;right:14px;bottom:12px;text-align:right;}
  .meter .lab{font-size:10px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase;color:var(--gold-hi);text-shadow:0 1px 6px rgba(0,0,0,.7);}
  .meter .val{font-family:'Playfair Display',serif;font-size:42px;font-weight:700;line-height:1;color:#fff;text-shadow:0 2px 12px rgba(0,0,0,.65);}
  .meter .sub{font-size:11px;color:#dcd7cf;text-shadow:0 1px 6px rgba(0,0,0,.7);margin-top:2px;}
  .hero .ttl{position:absolute;left:16px;bottom:14px;max-width:62%;}
  .ttl .nm{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;line-height:1.16;text-shadow:0 2px 10px rgba(0,0,0,.7);}
  .ttl .dt{font-size:12px;color:#dcd7cf;margin-top:4px;text-shadow:0 1px 6px rgba(0,0,0,.7);}
  .hero.noart{padding:22px 18px;}
  .hero.noart .ov{display:none;}
  .hero.noart .ttl,.hero.noart .meter{position:static;max-width:none;text-align:left;}
  .hero.noart .meter{margin-top:16px;}

  /* ── строка-статистика под постером ── */
  .summary{display:flex;flex-wrap:wrap;gap:10px;margin:14px 0 8px;}
  .scard{flex:1;min-width:150px;background:var(--panel);border:1px solid var(--hairline);border-radius:12px;padding:11px 13px;}
  .scard .k{font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);}
  .scard .v{font-size:20px;font-weight:700;margin-top:3px;}
  .scard .v small{font-size:12px;color:var(--mut);font-weight:600;}

  /* ── легенда источников ── */
  .legend{display:flex;flex-wrap:wrap;gap:8px 16px;font-size:11.5px;color:var(--mut);margin:6px 0 14px;align-items:center;}
  .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .conn{font-weight:700;}
  .conn.up{color:var(--ok);}
  .conn.down{color:var(--bad);}

  /* ── таблица ── */
  .tbl-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--hairline);background:var(--panel);}
  table{border-collapse:collapse;width:100%;font-size:13.5px;min-width:560px;}
  thead th{position:sticky;top:0;background:#1b1b22;color:var(--mut);font-size:10.5px;font-weight:800;
    letter-spacing:.8px;text-transform:uppercase;text-align:right;padding:10px 9px;white-space:nowrap;z-index:2;border-bottom:1px solid var(--hairline);}
  thead th.l{text-align:left;}
  tbody td{padding:9px 9px;text-align:right;border-bottom:1px solid rgba(255,255,255,.045);white-space:nowrap;}
  tbody td.l{text-align:left;}
  tbody tr:nth-child(odd){background:rgba(255,255,255,.022);}      /* зебра */
  tbody tr:hover{background:rgba(232,200,122,.06);}
  tbody tr.applied{opacity:.82;}
  tbody tr.applied .pl-nick::after{content:"заявка";font-size:9px;font-weight:800;letter-spacing:.6px;
    color:var(--warn);border:1px solid rgba(232,185,77,.4);border-radius:8px;padding:1px 6px;margin-left:7px;text-transform:uppercase;}
  /* липкий компактный якорь: # + аватар + ник */
  th.anchor,td.anchor{position:sticky;left:0;background:var(--panel);z-index:1;}
  thead th.anchor{background:#1b1b22;z-index:3;}
  tbody tr:nth-child(odd) td.anchor{background:#181820;}
  tbody tr:hover td.anchor{background:#241f14;}
  .pl{display:flex;align-items:center;gap:9px;}
  .pl .num{color:var(--dim);font-size:11px;width:18px;text-align:right;flex:none;}
  .pl .av{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:none;background:#222;border:1px solid var(--hairline);}
  .pl .mono{width:30px;height:30px;border-radius:50%;flex:none;display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:800;color:#0b0b0e;background:linear-gradient(135deg,var(--gold-hi),var(--accent));}
  .pl-nick{font-weight:700;}
  .pl-real{font-size:11px;color:var(--dim);}
  .elo{font-weight:700;font-variant-numeric:tabular-nums;}
  .elo .g{font-size:11px;color:var(--dim);font-weight:500;}
  .na{color:var(--dim);}
  .flag{cursor:help;font-size:11px;}
  .flag.amb{color:var(--warn);}
  .flag.nomaf{color:var(--mut);}
  .lnk{font-size:11px;color:var(--mut);}
  .lnk:hover{color:var(--accent);}
  .lnk+.lnk{margin-left:8px;}
  .note{font-size:11.5px;color:var(--dim);margin-top:14px;line-height:1.7;}
  .foot{margin-top:34px;text-align:center;color:#48454f;font-size:11.5px;line-height:1.9;}
  .foot a{color:#6b6776;border-bottom:1px solid rgba(255,255,255,.1);}
  h1.err{font-family:'Playfair Display',serif;}
  @media(max-width:560px){
    .meter .val{font-size:32px;}
    .ttl .nm{font-size:17px;}
  }

  /* ── сортируемые заголовки + рейтинговые ячейки ── */
  thead th.sortable{cursor:pointer;user-select:none;}
  thead th.sortable:hover{color:var(--gold-hi);}
  thead th .ar{opacity:.35;font-size:9px;margin-left:3px;}
  thead th.act{color:var(--gold-hi);}
  thead th.act .ar{opacity:1;}
  .rnum{font-weight:700;font-variant-numeric:tabular-nums;}
  .rrank{font-weight:700;font-variant-numeric:tabular-nums;}
  .rrank .h{color:var(--dim);font-weight:500;font-size:11px;}
  td.grp{border-left:1px solid rgba(232,200,122,.10);}
  th.grp{border-left:1px solid rgba(232,200,122,.10);}
  /* ── тиры (ранги markery) ── */
  .tier{display:inline-block;min-width:24px;padding:2px 8px;border-radius:7px;font-weight:800;font-size:12.5px;text-align:center;letter-spacing:.5px;}
  .t-S{background:linear-gradient(135deg,#e8c87a,#c9a14d);color:#0b0b0e;box-shadow:0 0 10px rgba(232,200,122,.35);}
  .t-A{background:rgba(103,224,143,.16);color:#67e08f;border:1px solid rgba(103,224,143,.45);}
  .t-B{background:rgba(122,167,214,.16);color:#9cc0e6;border:1px solid rgba(122,167,214,.45);}
  .t-C{background:rgba(232,200,122,.12);color:#e8c87a;border:1px solid rgba(232,200,122,.32);}
  .t-D{background:rgba(255,255,255,.05);color:#bdb9c8;border:1px solid rgba(255,255,255,.14);}
  .t-E{background:rgba(155,151,168,.10);color:#9b97a8;border:1px solid rgba(155,151,168,.28);}
  .t-F{background:rgba(224,101,77,.15);color:#e0654d;border:1px solid rgba(224,101,77,.38);}
  td.tcell{text-align:center;}
  tr.tsep td{background:#15151b;color:var(--mut);font-size:10px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase;padding:7px 11px;text-align:left;border-top:2px solid rgba(232,200,122,.20);}
  tr.tsep .tier{margin-right:8px;}
  .tdist{display:flex;flex-wrap:wrap;gap:7px;margin:2px 0 14px;align-items:center;}
  .tdist .lbl{font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-right:2px;}
  .tdist .tc{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:800;padding:3px 9px 3px 4px;border-radius:9px;background:var(--panel);border:1px solid var(--hairline);}
  .tdist .tc small{color:var(--mut);font-weight:700;}
</style>
</head>
<body>
<div class="wrap">
  <a class="back" href="#" id="back">← к турниру</a>
  <div id="app"><p class="note">Загрузка…</p></div>
  <div class="foot">
    MafgameStat — неофициальная статистика <span style="color:var(--gold)">◆</span>
    рейтинги: <a href="https://markery.online">markery.online</a> · <a href="https://mafiastats.com">mafiastats.com</a> ·
    заявки: <a href="https://mafgame.org">mafgame.org</a>
  </div>
</div>

<script src="data/tournaments.js"></script>
<script>
const qs=new URLSearchParams(location.search);
const T=qs.get('t')||'766';
document.getElementById('back').href='tournament.html?t='+T;
const REG=(window.TOURNAMENTS_DB?.tournaments||[]).find(x=>x.id===T)||{};
if(REG.accent)document.documentElement.style.setProperty('--accent',REG.accent);

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function mono(nick){const m=(nick||'?').replace(/[^A-Za-zА-Яа-яЁё0-9]/g,'').slice(0,2).toUpperCase()||'·';return m;}
function avatar(p){
  if(p.av)return `<img class="av" src="${esc(p.av)}" alt="" onerror="this.outerHTML='<span class=\\'mono\\'>'+this.dataset.m+'</span>'" data-m="${esc(mono(p.nick))}">`;
  return `<span class="mono">${esc(mono(p.nick))}</span>`;
}

fetch('data/participants_'+T+'.json').then(r=>{if(!r.ok)throw 0;return r.json()}).then(render)
  .catch(()=>{document.getElementById('app').innerHTML='<h1 class="err">Нет данных</h1><p class="note">Снапшот участников для этого турнира ещё не собран.</p>';});

let DATA=null;
const TIERS=['S','A','B','C','D','E','F'];
const TIER_ORD={S:0,A:1,B:2,C:3,D:4,E:5,F:6};
const TIER_LAB={S:'S — топ',A:'A',B:'B',C:'C',D:'D',E:'E',F:'F'};
const COLS=[
  {key:'tier',     lab:'Ранг',       hint:'ранг markery (S/A/B/C/D/E/F) по текущему ELO',  dir:1,  fmt:'tier', get:p=>p.r_tier},
  {key:'elo_cur',  lab:'ELO тек',    hint:'markery — текущий ELO (глобально, всё время)',  dir:-1, fmt:'elo',  get:p=>p.r_elo_cur},
  {key:'elo_2026', lab:'ELO 2026',   hint:'markery — ELO за сезон 2026',                   dir:-1, fmt:'elo',  get:p=>p.r_elo_2026},
  {key:'eu26',     lab:'Европа 2026',hint:'markery — место в рейтинге Европа за 2026',      dir:1,  fmt:'rank', get:p=>p.r_rank_eu_2026},
];
let sortKey='tier', sortDir=1;

function num(v){return (v==null||v==='')?null:+v;}
function colVal(col,p){ const v=col.get(p); if(col.fmt==='tier'){ return (v in TIER_ORD)?TIER_ORD[v]:null; } return num(v); }
function sortPlayers(){
  const col=COLS.find(c=>c.key===sortKey);
  DATA.players.sort((a,b)=>{
    const va=colVal(col,a), vb=colVal(col,b);
    if(va==null&&vb==null) return a.nick.localeCompare(b.nick,'ru');
    if(va==null) return 1;
    if(vb==null) return -1;
    if(va===vb){ // tie-break: внутри тира — по ELO убыв.
      const ea=num(a.r_elo_cur), eb=num(b.r_elo_cur);
      if(ea!=null&&eb!=null&&ea!==eb) return eb-ea;
      return a.nick.localeCompare(b.nick,'ru');
    }
    return (va-vb)*sortDir;
  });
}
function cellRank(v){ v=num(v); return v==null?'<span class="na">—</span>':`<span class="rrank"><span class="h">#</span>${v}</span>`; }
function cellElo(v){ v=num(v); return v==null?'<span class="na">—</span>':`<span class="rnum">${Math.round(v)}</span>`; }
function cellTier(v){ return (v && (v in TIER_ORD))?`<span class="tier t-${v}">${v}</span>`:'<span class="na">—</span>'; }

function render(D){
  DATA=D;
  const meta=D.meta, players=D.players, art=REG.art;
  // статистика считается из игроков (без отдельного stats-объекта)
  const eloVals=players.map(p=>num(p.r_elo_cur)).filter(v=>v!=null);
  const eloAvg=eloVals.length?Math.round(eloVals.reduce((a,b)=>a+b,0)/eloVals.length):null;
  const msVals=players.map(p=>num(p.r_ms_rank)).filter(v=>v!=null);
  const nConf=players.filter(p=>p.status==='confirmed').length;
  const mkUp=eloVals.length>0, msUp=msVals.length>0;

  const meterHtml = `
    <div class="meter">
      <div class="lab">Ожидаемый ср. ELO · markery</div>
      <div class="val">${eloAvg!=null?eloAvg:'N/A'}</div>
      <div class="sub">${eloAvg!=null?('по '+eloVals.length+' из '+players.length+' игроков'):'нет данных'}</div>
    </div>`;
  const heroHtml = art ? `
    <div class="hero">
      <img src="${esc(art)}" alt="" onerror="this.closest('.hero').classList.add('noart');this.remove()">
      <div class="ov"></div>
      <div class="ttl"><div class="nm">${esc(REG.name||meta.name)}</div><div class="dt">${esc(REG.dates||'')} · ${esc(REG.city||'')}</div></div>
      ${meterHtml}
    </div>` : `
    <div class="hero noart">
      <div class="ttl"><div class="nm">${esc(REG.name||meta.name)}</div><div class="dt">${esc(REG.dates||'')} · ${esc(REG.city||'')}</div></div>
      ${meterHtml}
    </div>`;

  const summary = `
    <div class="summary">
      <div class="scard"><div class="k">Участников</div><div class="v">${players.length}<small> / ${meta.expected||'—'} ожид.</small></div></div>
      <div class="scard"><div class="k">markery · ср. ELO</div><div class="v">${eloAvg!=null?eloAvg:'—'}<small> n${eloVals.length}</small></div></div>
      <div class="scard"><div class="k">с рейтингом markery</div><div class="v">${eloVals.length}<small> / ${players.length}</small></div></div>
    </div>`;

  const legend = `
    <div class="legend">
      <span><span class="dot" style="background:var(--accent)"></span>markery — основной: <span class="conn ${mkUp?'up':'down'}">${mkUp?'подключён':'нет данных'}</span></span>
      <span><span class="dot" style="background:#7aa7d6"></span>mafiastats — сверка: <span class="conn ${msUp?'up':'down'}">${msUp?'подключён':'нет данных'}</span></span>
      <span>↕ клик по заголовку колонки — сортировка</span>
    </div>`;

  // распределение по тирам
  const tcounts={}; players.forEach(p=>{ if(p.r_tier in TIER_ORD) tcounts[p.r_tier]=(tcounts[p.r_tier]||0)+1; });
  const tdistHtml = `<div class="tdist"><span class="lbl">Тиры (markery):</span>` +
    TIERS.filter(t=>tcounts[t]).map(t=>`<span class="tc"><span class="tier t-${t}">${t}</span><small>${tcounts[t]}</small></span>`).join('') +
    `</div>`;

  const app=document.getElementById('app');
  app.innerHTML = heroHtml + summary + legend + tdistHtml +
    `<div class="tbl-wrap"><table>
       <thead><tr id="hr"></tr></thead>
       <tbody id="tb"></tbody>
     </table></div>` + noteHtml();
  buildHead(); paint();
}

function noteHtml(){
  return `<p class="note">
    Рейтинг markery — снимок через API на 2026-07-15 (после турниров Польша-766 и Кёльн-702, ELO пересчитан). «ELO тек» — текущий ELO (глобально, всё время); «Тир» — буквенный ранг markery (S/A/B/C/D/E/F) по этому ELO; «ELO 2026» — ELO за сезон 2026; «Европа 2026» — место в рейтинге Европа за 2026. Клик по «Тир» группирует игроков по рангам.
    «—» — игрок ещё не сматчен с markery или без рейтинга. Все 44 сматчены (у части ник на markery отличается от mafgame: Гамбитик→«Гамбит», SANYURIK→«Sashko», Призрак→«The Призрак»). Ростер — 44 подтверждённых с mafgame.org на 2026-07-15.
    У части игроков ник на markery отличается от mafgame (напр. Season's → «Spring») — ссылка ведёт на их профиль markery напрямую. Список и составы — с mafgame.org.
  </p>`;
}

function buildHead(){
  const hr=document.getElementById('hr');
  let th='<th class="l anchor sortable" data-k="player">Игрок<span class="ar"></span></th>';
  th+=COLS.map((c,i)=>`<th class="sortable${i===0?' grp':''}${i===2?' grp':''}" data-k="${c.key}" title="${esc(c.hint)}">${esc(c.lab)}<span class="ar"></span></th>`).join('');
  th+='<th class="l">профиль</th>';
  hr.innerHTML=th;
  hr.querySelectorAll('th.sortable').forEach(el=>el.onclick=()=>{
    const k=el.dataset.k;
    if(k==='player'){ sortKey='player'; }
    else if(sortKey===k){ sortDir=-sortDir; }
    else { sortKey=k; sortDir=(COLS.find(c=>c.key===k)||{}).dir||-1; }
    paint();
  });
}

function paint(){
  if(sortKey==='player'){ DATA.players.sort((a,b)=>a.nick.localeCompare(b.nick,'ru')); }
  else sortPlayers();
  // индикаторы в шапке
  document.querySelectorAll('#hr th').forEach(th=>{
    const k=th.dataset.k; const ar=th.querySelector('.ar'); if(!ar)return;
    if(k===sortKey){ th.classList.add('act'); ar.textContent=(k!=='player'&&sortDir<0)?'▼':'▲'; }
    else { th.classList.remove('act'); ar.textContent=''; }
  });
  const rows=DATA.players.map((p,i)=>{
    const links=[];
    if(p.uid) links.push(`<a class="lnk" href="https://mafgame.org/user/${p.uid}/view" target="_blank" rel="noopener">mafgame</a>`);
    if(p.markery_id) links.push(`<a class="lnk" href="https://markery.online/playerStatistics?eloType=101&playerId=${p.markery_id}&tab=EloHistory" target="_blank" rel="noopener" title="ник на markery: ${esc(p.markery_nick||'')}">markery</a>`);
    if(p.ms&&p.ms.id) links.push(`<a class="lnk" href="https://mafiastats.com/players/${p.ms.id}" target="_blank" rel="noopener">mafiastats</a>`);
    // (матчинг markery подтверждён вручную — флаг неоднозначности снят)
    const club=p.club?`<br><span class="pl-real">${esc(p.club)}</span>`:(p.real?`<br><span class="pl-real">${esc(p.real)}</span>`:'');
    return `<tr class="${p.status}">
      <td class="l anchor"><div class="pl"><span class="num">${i+1}</span>${avatar(p)}<span><span class="pl-nick">${esc(p.nick)}</span>${club}</span></div></td>
      <td class="tcell grp">${cellTier(p.r_tier)}</td>
      <td>${cellElo(p.r_elo_cur)}</td>
      <td>${cellElo(p.r_elo_2026)}</td>
      <td class="grp">${cellRank(p.r_rank_eu_2026)}</td>
      <td class="l">${links.join(' ')||'<span class="na">—</span>'}</td>
    </tr>`;
  });
  let html='', prevTier=null;
  const grouping=(sortKey==='tier');
  const counts={}; DATA.players.forEach(p=>{ if(p.r_tier in TIER_ORD) counts[p.r_tier]=(counts[p.r_tier]||0)+1; });
  rows.forEach((rowHtml,idx)=>{
    if(grouping){
      const t=DATA.players[idx].r_tier; const key=(t in TIER_ORD)?t:'—';
      if(key!==prevTier){
        const cls=(key in TIER_ORD)?('t-'+key):'';
        const badge=(key in TIER_ORD)?`<span class="tier ${cls}">${key}</span>`:'<span class="na">—</span>';
        const cnt=(key in TIER_ORD)?counts[key]:DATA.players.filter(p=>!(p.r_tier in TIER_ORD)).length;
        html+=`<tr class="tsep"><td colspan="6">${badge} ранг ${key in TIER_ORD?key:'без данных'} · ${cnt} игр.</td></tr>`;
        prevTier=key;
      }
    }
    html+=rowHtml;
  });
  document.getElementById('tb').innerHTML=html;
}

</script>
</body>
</html>
